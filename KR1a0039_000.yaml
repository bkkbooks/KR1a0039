body:
  text: 易説易類提要臣等謹案易説四卷宋宗室趙善譽撰善譽字静之乾道五年試禮部第一累遷大理丞潼川路提刑轉運判官事蹟見宋史是編載陳振孫書録解題振孫稱其每卦為論一篇盖為潼川漕時進呈之本今考其書於各卦名義之相似者多參互以求其義如云頤井鼎皆有養人之義豈非養人之利溥故多取象以示人耶又云三卦義雖不同皆以上爻為吉故頤之由頤井之勿幕鼎之玉鉉皆在上爻也至於各卦之六爻亦往往比類以觀之如乾卦云初九之辭決戒之切也九四之辭疑則與之進也九三之辭詳猶可勉也上九之辭直則可為也聖人之言纎悉委曲一至於此亦惟恐其陽剛之或偏而已論坤卦云乾坤二卦惟二五兩爻為善而他爻皆有戒之之辭又云履霜戒于一陰之生括囊戒于多懼之位三猶可以含章而從事上則至于龍戰而道窮亦乾卦爻辭不同之意論頤卦云頤以養正而不妄動為善下卦震體有動而求養之象故三爻皆凶上卦艮體有静而知止之象故三爻皆吉論革卦云内明則見理必盡外説則無拂于人情不如是而能革者未之有也論節卦云六四以陰柔而應于初又上承九五之陽能安則無所往而不通故曰亨承上道也九五居尊得位剛健中正節之當者也當則無所往而不可故曰甘節吉往有尚以其在臣故曰安曰亨言已能安之則亨也以其在君故曰甘曰吉言施之天下人皆美之然後為吉也其論皆明白正大朱子謂其能擴先儒之未明馮椅易學亦多取之謂其能本畫卦命名之意參稽卦爻彖象之辭以貫道六爻之義而為之説盖不虚美也自明以來外間絶少傳本故朱彝尊經義考注云已佚今永樂大典具載於各卦之後僅缺豫隨无妄大壯晉暌蹇中孚八卦因搜緝成編資説易家之參考宋史藝文志本作二卷今以其文頗繁釐為四卷焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序昔者焴之先公喜易早嵗集諸公書而録之晚以禁從侍筵乃得光堯御書乾卦以冠篇首遂為世寳焴幼而肄業于他經皆略通理義其于易葢亦成誦至究其説則茫然如繋風捕影莫得窺測時于文字雖復援證而實不了然也年三十餘乃似有所入嘗以叩親舊之治易者曰以卦為時以爻為位而觀易其可乎則笑而應曰某但作時文耳初不窮經也焴雖不得問而自此亦稍能措意遇易家書得以覽觀有言之者得以應酬矣然止于涉獵終不能究極有所論著去嵗假守安陸而武陵故人畢希簡叔文寄示恕齋易説一編伏而讀之犂然㑹心簡而備婉而通深而不晦竒而不鑿渾渾乎其純也原原乎其正也是誠可與同志共之者獨患板大非書生巾衍所宜欲易為小本久矣適方開鄖溪集未暇及兹畢工則有餘板乃俾鋟之庶以廣傳非特真學易者得為指南雖從事科舉而用是馳騁敷揚于塲屋間亦足以策勲矣時恕齋既繇本路倉使改持東蜀祥刑之節嗟乎推是道也亦安徃而不為民福哉淳熙丙午秋九月辛亥建康秦焴書易統論易之作也所以示天下為君父者也其數以天包地容而兼之者君父之道也𤣥之作也所以示天下為臣子者也其數以地承天奉而行之者臣子之道也是故易用四象而不用五行用六爻而不用九位與夫爻用九用六而六位以二五為中者皆虚容而不亢以待續終之事也此君父之道也地有四方𤣥用三方存北極以為𤣥老陽有三十六策𤣥用三十三策虚地三以併天與夫書年日不書月而九位以一五為中者皆尊奉而不敵以推造始之原也此臣子之道也𤣥本地道而作故首與之卦準易緯之用而不準易經之體也或曰緯非經也子雲雖準之其可信乎曰卦氣圖冬至始于復夫復者一陽之生也先之以中孚者七日來復也夏至始于姤者一隂之生也先之以咸者亦七日來姤也孔子賛易上繋者天道也其舉七爻而先之以中孚之九二者冬至起中孚之理也下繋者地道也其舉十一爻而先之以咸之九四者夏至起咸之理也夫中孚咸皆感應也中孚九二无心之感先天之生陽也咸之九四有心之感後天之生隂也大抵隂陽皆由感應而生故卦氣圖以復繼中孚而以姤繼咸之義孔子實言之矣孰謂非出于子夏商瞿之所衍述乎子雲準之豈妄也哉
