body:
  text: 易說卷二宋趙善譽撰上經二蠱至離蠱卦說蠱自泰來大往小來之初也故蠱以敝壞為義而治蠱惟陽剛中正乃克有濟初陽位也以六居之故雖可以幹父之蠱而厲然後吉二隂位也以九居之故可以幹母之蠱而不可貞九三陽居陽位故可以幹父之蠱而無大咎其所以小有悔者為陽剛而不中也六四隂居隂位隂柔之至非能有為者也徒增益其蠱而已故裕父之蠱而往見吝六五雖隂而居陽位柔得中居尊而下有剛中之應亦可以有為者也故曰幹父之蠱用譽上九陽居隂位處蠱之極有能為之資而不可有為者也故曰不事王侯髙尚其事四爻皆取幹父之蠱為義而九二獨曰幹母之蠱故曰剛上而柔下言其自泰來也否極則必變而之泰故隨有隨時適變之意泰極則有復否之理故蠱為治敝之卦設卦命名之義豈苟然㦲大抵適變不能不隨而隨常患乎不正當隨之時而不知適變則失時徒知適變而不能守正則失已二者皆非也故六爻雖専取其相比相隨而不必其應然非陽居陽位則必有戒之之辭至隂爻則惟取其能比于陽而隨之蓋惟恐隂柔之不能正也初九陽居陽位為動之主于隨之初而能有立者也故曰官有渝官言其守也有渝言其變也惟其有守也故能貞而吉惟其有渝也故能出而與物接故又曰貞吉出門交有功也六二當隨之時而近比于六三之隂係于小子者也上係隂則下不能兼與乎初九之陽矣故曰係小子失丈夫言隨乎上則失乎下也六三當隨之時而近比于九四之陽係于丈夫者也上係乎陽則下舍六二之隂也故曰係丈夫失小子隨有求得利居貞言隨乎陽則可以求而有得惟在于居正也六三隂也而比于九四故求于陽而有得謂隂之得于陽也九四陽也而比于九五故能隨九五之中正而有獲于下之二隂謂陽之能得隂也此求有得隨有獲之異也六二六三之二隂上而隨乎陽莫如九五之尊也而九四以陽剛之才居近君之位二隂比之蠱以其內卦之中也五爻皆取人子幹蠱為義而上九獨曰不事王侯以其在外卦之極也其在內則所幹為有限其在外則不事不失為髙尚其實隨自否來有變而為泰之漸故上六曰王用享于西山所謂小往大來吉亨者也蠱自泰來有積而為否之漸故上九曰不事王侯髙尚其事所謂拔茅茹以其彚貞吉亨者也先甲後甲之說先儒謂甲者事之始也先甲則先于此而究其所以然後甲則後于此而慮其將然又曰復稱七日自姤經六爻至復初九而七也臨稱八月復經六爻至遁六二而八也先甲後甲亦六日之義其說得之若論甲庚而及于辛丁巫史之言也仲尼之所不道也臨卦說一陽為復陽始生也二陽為臨陽浸長也陽剛方長有進而無退故序卦曰臨者大也言陽之方盛也舊注曰相臨之道莫若說順亦臨之義也當臨之時剛浸而長莫能禦也內說而外順無所忤也九二剛得中而應乎五不可問也合是三者上下內外彼己之間無一毫之逆境人情之所易忽也故卦辭言元亨利貞而繼之以八月有凶于其陽盛之際而先戒之以隂之將然也自一陽生而為復長而為臨八變而得遁遁者隂之長也隂長則陽遁矣故曰有凶惟能于方盛之時而預知其將有凶之理庶乎其盛而不驕也坤之初六曰履霜堅氷至泰之九三曰無平不陂無往不復于姤卦一隂之生又曰勿用取女皆聖人先為之戒也臨之六爻雖以相臨為義其實二陽方長在上四爻惟與陽為應者然後足以為吉初九九二兩爻皆以陽在下而與上卦六四六五為正應是上有以臨之而下有以感之也故六四居近君大臣之位則曰至臨無咎而初九曰咸臨貞吉六五柔得尊位則曰知臨大君之宜吉而九二曰咸臨吉無不利以其應于四故曰貞吉以其應于五故曰吉無不利然皆感于臨而應之故皆曰咸臨也至于六三上六無陽以為應故六三曰甘臨無攸利言處兑說之極以佞說姑息臨下不足以為利也上六曰敦臨吉無咎言處坤順之極以敦厚接下雖無應而無咎也此又各以其兑坤之體言之也惟九二之象曰未順命也最為難解說者或曰若順于五則剛德不長其能無不利者必未順命也或曰其順之實已見于未命之先矣或曰未順命者有獻可替否之義非獨順命而後利也其說皆有理而未盡其實咸臨之吉本于剛柔中正之相感非上之所能命也觀卦說臨以二陽方長為義故在上四爻惟與二五相應為最吉觀以二陽在上而取羣隂觀仰為義故在下四爻以其去陽之逺近為善否初六以隂柔處觀之始去陽為最逺所觀見者淺童蒙之觀小人之道也故曰童觀小人無咎君子吝六二以隂柔在內卦之中而去陽亦逺如窺而觀之婦人之道也故曰窺觀利女貞六三去陽漸近可以觀仰于上也然六以隂居陽位而在坤順之極有欲進而不能之象故雖能觀于陽而未免于進退故曰觀我生進退六四隂柔得位而切近于陽可以觀仰而親附于陽者也故曰觀國之光利用賓于王皆以去陽之逺近而為之等差也九五以陽剛中正而有六二之正應上九雖無位而下有四隂非如乾上九之無民也惟觀已之剛德允協于君子則可以無咎故皆有觀生之辭既能觀我陽剛之德則可以觀隂之必應故九五之象又有觀民之辭先儒釋六三之觀我生謂動作施為之出于已者釋九五之觀我生謂時俗政化之出于已者其說殊為費辭要之陽為德而主生羣隂之所觀仰也故陽以生為言隂為彼則陽為我故生以我為言至上九不曰我而曰觀其生則有髙亢作為之意象所以云志未平者也說者謂臨與所臨觀與所觀皆有與求之義或有與無求或有求無與皆非臨觀之義蓋因兩或字而為之說也其義雖通而考之卦畫則未盡然其實臨二陽方進而在下専以隂陽相感應為義故曰與觀二陽在上則以隂求親于陽為義故曰求舊注未為不然也噬嗑卦說否一變而為隨者上九之剛下于坤柔而為初九初六之柔上于乾剛而為上六下卦為震而上卦為兑震動兑說則否之象變矣故為隨時當乎隨物必說而從之然不能皆隨也有強梗以為吾之間聖人不能不去之故隨一變而為噬嗑九四陽非其位而在中虛之下震動之上頥中有物之象也噬而嗑之則非正之剛不得而間故噬嗑必亨而利于用獄也否之變隨不過初上兩爻升降而已剛柔未相間也至噬嗑則初六之柔上而入于二陽之中九五之剛下而處于二隂之下六爻之剛柔始分矣故曰剛柔分又曰柔得中而上行震得陽而動離得隂而明故曰動而明又曰雷電合而章用獄之道莫大乎威與明也說者皆曰噬嗑專以除間用獄為義初九雖陽爻而在六爻之下則取下民受刑之象上九居無位之地亦為受刑之人惟二三四五皆言噬蓋用刑除間之爻且九四以卦言之則為間者也以爻言之則居大臣之位任除問之責者也是皆隨卦爻之辭而為之說則不免自相矛盾以初九上九為受刑之人固非易之本㫖既以九四為間而又曰任除間之責尤非通論也初九言屨校滅趾者謂懲當于其初也上九言何校滅耳者謂不幸有極惡之人則亦不得已而治之也其初苐欲其警而不趨于惡故不言噬其終惡積罪大則當深懲之故噬不足言也要之九四為間于頥中者也不可不噬而去之也初九六二六三六五皆噬之者也此四爻所以皆言噬也其實自九四之外初二三五與上九五爻皆當用刑之寄者也六二以柔處中宜用刑者也雖在震乘剛而幾于躁動其去惡如噬膚之易而沒鼻然柔中必不過于剛可以無咎也六三以隂居陽而在震之極動不量力者也故有噬臘肉遇毒之戒臘謂小物之全乾者也然亦不過小吝而已五居中故曰黃五陽位故曰金黃言其中而金言其剛所謂得黃金也然六居之終非其材故有噬乾肉之戒惟守正若厲則無咎也獨九四為間于一卦之內處非其地又剛而不中雖欲噬而去之而其實難噬者也故有乾胏之象胏肉之有骨而最難噬者雖噬之而得剛直之道又必克艱守正而後吉甚言其噬之難也賁卦說賁隨自否變故隨則無故既隨矣其不隨者不可不去也故又變而為噬嗑蠱自泰變故蠱則必飭既飭矣不可以無文飾之也故又變而為賁上六之柔來居乾陽之中而為離九二之剛上處坤隂之上而為艮剛柔相交以為文也然柔文剛則曰亨剛文柔則曰小利有攸往者柔來而居二得中得正故亨剛上而居外人否之漸也故小利有攸往而已賁之六爻專以剛柔相比相應而後足以為文初九近六二也而有六四之應故雖在下亦能賁飾其所行苟非其義寧舍車而徒爾以其才剛而有離之明也六二柔麗乎中正而上下二陽賁之其所以為飾者美矣然正應在五而六五不能相應必有待而後興也故曰賁其須須者待也惟得時得君而後足以致文明之化也九三居六二六四之間賴二隂之相濡以為賁者也然處乎隂柔之間常患乎不正而易流故曰永貞吉能永貞則終莫之陵矣六四雖有初九之應而乘九三之剛故疑九三之冦已而不獲陽剛之賁曰賁如皤如者言其白而不受飾也曰匪冦婚媾言當賁之時剛柔相比以為文雖乘剛亦婚匹而非冦也六五下無其應而比于上九之陽有賁于在外之賢之象故曰賁于丘園束帛戔戔吝終吉非謂幣聘當吝也謂其獨賁于上九則吝而未廣也然不失為好賢下士故終吉也上九居賁飾之極而在艮止之終故惟反之質素而後無咎故曰白賁無咎深言其不可過于文也此雜卦所謂賁無色者也剝卦說柔變剛則剛剝落故曰剝剝自下而上至于五則隂柔之盛也故曰不利有攸往惟君子觀坤順艮止之象故當剝之時不過順而止之而已五隂一陽而為剝君子所宜忿疾也而曰順而止之五陽一隂而為夬君子所宜亟決也而曰孚號有厲聖人之為君子慮何其戒謹而不敢忽如此㦲剝之諸爻所有剝牀以足以辨以膚之别者以其自下而上也足者牀之足也當剝之初隂來剝陽大往小來而滅沒于正道者也故曰滅貞凶辨者牀之幹以其分隔上下而謂之辨也剝牀而以辨則隂柔浸長矣故亦曰蔑貞凶六四之膚則將滅其身也故曰切近災也若乃六三在六四之下不言剝牀而曰剝之無咎者以其上應于上九之陽小人之知歸乎君子者也故許之以無咎而象亦言其失上下同類之故也六五居剝之極亦不言剝而曰貫魚以宫人寵者以剝及君位難于有言故但言人主所以待羣隂之道必防微杜漸當如貫魚使之順序以宫人之寵寵之而不假之以權則終無尤也上九以陽剛而在艮止之上隂之所不能剝者也故如碩果之不食將有復生之理艮反為震剝反為復則君子可以有行故曰君子得輿震陽動于復而極于夬則小人將無所庇矣故曰小人剝廬所以深戒夫小人之進而為君子地也復卦說姤者陽之始消也消則必復故震之一陽動于坤下而為復曰復亨者下動上順既復則必亨也曰出入無疾者言陽之消長皆以漸也曰朋來無咎者言一陽之生甚微必得其朋類之來然後為臨為泰而無咎也曰反復其道者言消而復長也曰七日來復者乾一變為姤二變為遁三變為否四變為觀五變為剝六變為坤七變而陽始復也曰復其見天地之心者坤靜而震動一陽動于下而為生物之始也先儒或謂動靜見天地之心或謂生物為天地之心要之非靜則何以能動非動則何以生物其實一理也雖然隂極則陽生陽極則隂生隂陽消長若循環而一隂之生止曰姤一陽之生乃曰復何也復以來復為義謂其本有也所以幸夫陽之生也姤若始相遇然所以惡其隂之逢也此聖人任德不任刑進君子而退小人之意初九以陽剛為震之主在復之初其失不逺而能復者也故爻辭言無祗悔元吉而象曰以修身也六二柔順中正而下比于初其復美矣故爻辭言休復吉而象曰以下仁也六三上無其應而以隂居陽位有欲善而資不能之象故頻失頻復厲而後無咎六四柔得位而下有初九之正應故居四隂之中而能獨復象亦言以從道也六五柔得尊位而下無其應然居坤體之中其敦厚足以自成而已故曰中以自考也上六以隂居隂而在坤之上復之極下無陽以應之隂柔之至不能自強者也故迷而不能復則行師取敗以其君凶久而至乎十年猶不可以有所往也然則陽剛之德君子其可一日無㦲此卦五隂在上而下惟一陽初九之復既可以修身矣六二比之則有下仁之美六四應之又有從道之善曰修身曰仁曰道皆謂在下一陽噫此其殆庶幾夫子所以獨歸顔子歟無妄卦說大畜卦說艮在上而乾在下乾健上進而為艮所止也故有畜之義艮陽卦也易以陽為大故曰大畜以别于小畜然初九九二乾體之陽也六四六五艮體之隂也他卦雖以隂陽之應為正此則專取艮止畜陽為義六四六五畜乾者也初九九二受畜者也惟九三與上九合志然後利有攸往考之六爻之辭斷可識矣初九曰有厲利己言健而上進則有危厲惟利于已而不進也需之乾遇坎故初九之象曰不犯難大畜以乾遇艮故初九之象曰不犯災皆所以為乾陽之戒也至六四則畜初九者也故曰童牛之牿元吉言畜初之剛如童牛未有角而先牿之則易制也九二曰輿說輹言艮止在上乾健不可以上進如輿之說去其輹可也小畜之九三逼近于隂故先言輿說輹而又戒以夫妻反目之相傷大畜之九二則在下卦之中故止言說輹則可以無尤其言如輿之不可以進則一也至六五則畜九二者也故曰豶豕之牙吉言畜九二之剛如豶其豕則牙雖存而無害也九三以陽居陽而與上為類故爻辭曰良馬逐又曰利有攸往而象又有上合志之辭言三陽之進如良馬之相逐利有所往而與上九陽剛之志合也上九處畜之極而下引三陽畜極則通者也故曰何天之衢亨而象又曰道大行也言道之大行無往而不亨何待衢路而後亨也然而九三之辭必言利艱貞曰間輿衛者以其居健之極雖有艮陽在上而不可不戒也輿所以行也衛所以自防也既利艱貞矣又必自警曰間習于輿衛而後有攸往則無輕進犯災之失矣此亦乾之九三終日乾乾夕惕若之意也頤卦說先儒言六二之顛頤曰下求于初則為顛倒至六四之顛頤則曰以上養下其施光矣言六二之拂經則以違經為非至六五之拂經則以違經為吉歷考六爻之義諸家之說或通于此而礙于彼或牽合其一而抵牾諸爻恐非通論也要之頤以養正為吉正以不妄動為善下卦震體有動而求養之象故三爻皆凶上卦艮體有靜而知止之象故三爻皆吉雖其爻之剛柔位之當否為義不同然吉凶之大概可決也初九居震之下動之主也故有舍爾靈龜觀我朵頤之戒六二隂居隂位又在震體之中其動而求養于陽必矣故反而從初九則為顛頤而拂經上而從其應則六五亦隂也故曰于丘頤征凶丘在上之象謂六五也六三以隂處陽在震動之極非頤之正也故不特凶而已且有十年勿用無攸利之戒焉凡此皆為震而言也六四當艮止之初隂得位而正應于初九是能止震動而養正者也故顛頤吉虎視耽耽而不用其威其欲逐逐而私欲不留養正之始也六五以柔居尊位下無其應而比于上九亦拂經也然居艮體之中居正而吉也雖止而不能涉大川不害其為柔順而能尚賢故曰順以從上也上九以艮陽居一卦之上羣隂由之以養也故曰由頤然不可以亢也故厲而後吉至于利涉大川而象以為大有慶則以其艮止之陽也凡此皆為艮而言也由是觀之頤之貴于止而不貴于動明矣君子所以謹言語節飲食而不敢妄動者其養正之要歟大過卦說卦惟六畫而四陽在中大者過也隂爻惟二而分于初上本末弱也本末皆弱故有棟橈之象剛雖過而二五皆剛中又內巽而外說故利有攸往而亨要之大過之時不患其不能有為而患陽剛之大過初六以柔居下故如藉之用茅而無咎九二九四皆以陽居隂位剛柔之相濟者也故二則無不利四則棟隆吉九三九五皆以陽居陽位剛之過者也故三則棟橈凶五雖無咎無譽而象有何可久亦可醜之辭惟上六雖隂柔而處大過之極故有過涉滅頂之凶無非以太過為戒也九二之陽下比于初六之隂故言老夫得其女妻九五之陽上比于上六之隂故言老婦得其士夫初六柔下而吉也故九二下比如枯楊之生稊稊根也上六過而必凶也故九五上比如枯楊之生華言其必不久也九三重剛不中而所應上六亦失于太過故直言棟橈之凶九四剛而能柔又有初六之正應故直言棟隆之吉說者謂九四剛柔得宜而志復應初之隂是有它也有它則纍于剛矣故曰有它吝殊不知大過之剛惟恐其不能柔也九四與初六為正應以六居初亦剛柔得宜也安得有吝况易中所謂有它者未有以正應為它者也比之初六專比于五而不應四故曰有他吉今九四既取其剛柔得宜以為吉矣而又曰有它吝者以其下近于九三恐其同類相比而舍正應則至于棟橈之凶故復戒之以此也不然九三之象何以曰棟橈之凶不可以有輔九四之象何以亦曰不橈乎下㦲坎卦說一陽陷于二隂之間故曰坎然剛實在中有孚者也外雖為隂所掩而心實亨况重坎之卦二五爻皆剛中而合德則陽動而比必得其類而可以出險矣此卦之所以獨曰習坎而謂之行有尚者也先儒多疑八純卦無增字往往以習字為衍蓋坎之為險非重之則剛中不能有尚而無以見出險之理此所以加習字而别乎不重之坎也初六以隂柔在下則為坎之深上六以隂柔終不足以出險則為坎之極故初有入于坎窞之凶而上有三嵗不得之凶六三柔不當位未能出乎下坎而又在上坎之下故來往皆不免于坎而有勿用之戒九二在下坎之中有得亨之理然以九之陽而居二之隂位則未能獨亨也故不過求小得而已惟九五陽居陽位又在上坎之中剛實而中正者也故雖如坎之不盈未能出險然陽剛得位終秪于平而無咎也若夫六四柔得其位已出于下坎之上而上比乎九五之陽當險之時剛柔交際君臣相須之象也故雖酒簋之微瓦缶之器自牖納此至約不必階序行禮之地而其誠意已接矣深言濟險之功必在乎君臣之交孚也大抵天一生水而為坎一者陽也坎雖以陷為義而乾陽在坤隂之中實萬物胚胎之始故易始于乾坤而屯蒙需訟師比六卦繼之者皆有坎非偶然也屯蒙以乾之一索再索三索于坤而為卦故震下坎上為屯坎下艮上為蒙皆以陽卦之合而成也然後以乾遇坎而為需訟以坤遇坎而為師比莫不有自然之序焉嗚呼此乾之所以居西北而坎居正北者歟離卦說坎以一陽陷于二隂之間而為坎離以一隂麗于二陽之間而為離坎雖陷于險然剛實在中故有孚維心亨而行有尚離雖麗而明然柔在中故必利貞而後亨能如畜牝牛則吉此坤之所以利牝馬之貞而用六坤之道必在于利永貞者也是故以六居五柔之麗乎中者也五陽位而隂居之非正也况承乘皆剛不可以不懼故必出涕戚嗟而後吉言王者不恃其文明而求公輔以為已助也故象曰離王公也言六五知此而後王公相附也以六居二亦柔之麗乎中也二隂位也而隂居之正也既中且正故黃離元吉而孔子以為得中道也言柔惟處正而後可以盡中道也履卦以隂履陽為義今初九在下而六二麗于上所謂履也附麗之始所履之邪正善惡紛錯而未知適從之時也不敬則妄動而獲咎矣故履錯之敬可以辟咎上九明之極而陽之亢也附麗之極不能無未服者而以太察之明過亢之陽臨之其不用兵者幾希故聖人以王者之師而戒之言王者之出征非樂于毒天下也所嘉者在于折取其渠魁而非必盡獲其醜類故無咎蓋不如是則未免于咎也孔子從而釋之曰以正邦也知所以正邦則豈察察而剛暴者㦲若夫九三陽剛不中居下離之上又在六二中正之上過乎中而不常其德者也故不鼓缶而歌則有大耋之嗟言其哀樂之不常也九四陽非其位而居下離之上又在近君多懼之地不量力而妄進者也故雖如離火之炎突然其來而適足自焚不免于危亡棄絶之禍也然則先儒謂所親近之人所由之道所主之事皆麗也可不謹㦲
