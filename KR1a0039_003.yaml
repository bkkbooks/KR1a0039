body:
  text: 易説卷三宋趙善譽撰下經一咸至革咸卦説咸説者皆曰咸感也六爻雖有不當其位而隂陽皆相應所以為咸殊不知艮下兊上內止而外説也內止則其感為無心外説則無感而不通以其本于無心故為感之至也是以艮之三爻皆以有應而不能止為戒九四上六皆以不中而有應為戒惟九五剛健中正在兊之中而與艮之六二為正應然後有咸其脢無悔之辭則以其應之本于中正而無心于感也易之爻象或近取諸身逺取諸物以發明一卦之義惟上艮下艮與此下艮上兊之卦則專取一身以為况艮自趾腓限夤身以至于輔咸自拇腓股心脢以至輔頰舌其爻皆有自然之序而皆以艮止為主則聖人所以曉天下後世者亦切矣何謂拇足之大指也何謂腓足肚是也股在腓上故先言腓而後言股皆行而動者也心則思而動者也輔與頰舌則言而動者也咸雖以相應為感要不可以動而有心也惟脢之在背非有欲者也非動而求感者所謂艮其背之意也九五剛中得位而下與艮體之中為正應非如九四初六之皆不當位又非如上六隂柔之至而下應九三不中之剛其所感中正必無私與故曰咸其脢言在背而非所見者亦感之則可見其無心之感為至也象所以言志末也者謂有志于感則末也初六之象曰志在外九三之象曰志在隨人皆惡夫志之動也初六以隂柔居艮止之始而上應九四則是不能止而欲動者也故曰咸其拇言其有動足之漸而所感者淺也六二以隂柔居艮止之中而上應九五亦非能止者也故其動而求感如腓之行則先動安得不凶故曰咸其腓凶居吉言求感則凶惟靜而不動則吉也九三居艮之極而上應上六有止極而妄動之象故曰咸其股執其隨往吝言不能止而如股之隨足則往必吝也此皆因艮體之有應而為之戒也九四以陽處隂既非其位而在兑之初下應初六未能至於無思之域者也故惟貞吉而後悔亡不然則凡隨其所感憧憧往來而未嘗暫已者物各以其朋類而從爾之思矣知物之來各因其思則一心之間非正安能吉而無悔哉孔子從而釋之曰貞吉悔亡未感害也言當正心于未感利害之先則湛然不為物役也上六以隂柔居兌之極而下應不中之九三誠之不足而欲以言語説人者也故如咸其輔頰舌徒滕揚其口舌而已此又以其兑體所應不中而為之戒也聖人于九四先言貞吉而後悔亡至九五則直言其無悔既于九四戒其有思之失又于九五明其無心之理則咸其可以有心為哉恆卦説説卦曰震動也巽入也巽入而靜未足以盡常久之理惟動而不失其常斯能久于其道故曰巽而動剛柔皆應恆又曰日月得天而能久照四時變化而能久成皆因動而見其常也象亦曰雷風恆君子以立不易方雷風所以鼓舞萬物也雷厲風飛可謂動矣而其所謂恆者未嘗變也故君子體震之動而出與物接體巽之靜而入與道俱動靜出入未嘗不易而所立之方則不易也方猶所也不易其所則于易之中而有不易者存也此所以為恆也艮止也若無與于感也然惟艮在內而説于外斯足以為咸以是知相感之至不必動而求感也巽入也若可見其恆也然于巽在內而動于外斯足以為恆以是知有恆之至必于動而後見也此皆以成卦言也非必専取男女長少之上下以别咸恆之義也若夫以六爻言之則內外之卦有宜言應者有不宜應者有爻雖應而位不應者此咸之六爻所以有凶吝而恆之六爻亦多凶也初六九二九三皆巽體也初六在巽入之下求恆而過深者也雖有九四之應而以隂居陽位鋭于初而不能恆也故正固則凶而無攸利九二在巽之中雖不當位而上有六五之應能合乎中者也故悔亡九三雖有上六之應而重剛不中居巽之極重剛則不能退巽柔則不能進或進或退不恆其德者也故或承之羞而貞固亦吝九四六五上六皆震體也九四在震之下動之主也然以九居四又與初六為應非可恆者也故如田而無禽雖動而無益也六五在震之中動而不違乎中者也故曰恆其德貞然以隂柔而下應九二則是尊從卑陽從隂也故又曰婦人吉夫子凶上六在恆之終而居動之極又下應九三不中之剛是以妄動為恆者振奮不已將失其恆凶之道也嗚呼知震巽之義然後可與論恆矣遁卦説先儒曰他卦以下為初遁者往遁也在前者先進故初反為尾尾在後之物也遁在後而不及是以危也諸家之説往往如此然易于初爻或曰咸其拇或曰壯于趾或曰艮其趾皆以初為義未有以為在後者也惟既濟之初九曰濡其尾未濟之初六亦曰濡其尾則以初濟與不能濟為喻亦未嘗以初為在後之象也况遁之為卦以二隂浸長而陽當遁為義初六隂之方長也何預于陽而以為遁之在後者哉其實遁之六爻于九三九四九五上九皆以遁為善所以為君子慮也于初六六二隂之浸長則皆有戒之之辭所以為小人戒也泥夫一卦之名而不察其剛柔之異此學易者之通患也何以言之首者初也尾者終也初六當遁之時而一隂方長其勢甚壯也聖人慮其乘時而不已于是為之戒曰遁尾厲言當遁之初隂柔雖可進而終則危厲如于二陽之長而先戒之以八月有凶之意故曰勿用有攸往而象亦曰不往何災也黃中色也牛順物也革則固也六以柔順居二又在下卦之中所謂黃牛也執之用黃牛之革者謂有此中順之德執之當固也六二隂既浸長而逼近九三所以戒其中順而固守也勝升證切説吐活切曰莫之勝説言惟執中順如革之固則莫能勝莫能説也象亦曰固志也甚言隂柔之不可妄進也自是以上則皆言陽之當遁宜知幾而逺避故九三近於二隂則係之而有疾厲九四逺于二隂矣則君子有好遁之吉九五以剛中正去二隂為益逺故曰嘉遁貞吉上九以陽剛超乎六爻之上去二隂為絶逺故曰肥遁無不利六爻之義豈不甚明哉初六九四剛柔之應也六二九五剛柔之應且正也他卦多以有應為善而遁之九四乃以好遁為君子之吉則是不必應于初也九五又直以遁為嘉且吉則是不必應于二也聖人于遁皆不欲陽之應于隂如此而彖辭又曰剛當位而應與時行也亦謂五之當位雖與二應而與時偕行當遁則遁不必専于應也亦逺小人不惡而嚴之意也嗚呼何其戒謹于君子小人之際哉大壯卦説晉卦説明夷卦説先儒言凡卦皆以五為君位惟明夷之君貴而無位髙而無民故以上六當之而五為切近至暗之人因以五當父師之任以明處之之道是未免以六五之言箕子而併以上六為君位也且其説既以六四為近君之大臣矣而又增父師一爻于大臣之上其可哉上六之為初登于天後入于地者以其處明夷之極故原其初之能照四國而深惜其後之失則蓋取日為喻以見明夷之極雖如此然非其本不明也六五之言箕子者不欲于君位而言明夷故言君子之處明夷之時者當如箕子之正其志也大抵明夷之卦最為難説故古今解者往往有大礙理處如九三一爻自王氏以至近時程氏楊氏漢上朱氏諸家皆以為去暗主湯武之事且以南狩謂前進而除害得其大首謂獲其昏暗之魁首嗚呼聖人忍言之哉易更三聖將以為天下萬世大訓安得有此言哉夫離在坤下有日入地中之象故謂之明夷九三居下卦之極在離之上其明有復出之漸焉故曰于南狩言當往于離方也得其大首言復向于明方則將得其端緒之大者也然猶在坤之下而未能遽出惟當守正俟時而不可以欲速故曰不可疾貞凡去昏而復明者皆若此非必專為人主言也而直謂之湯武之事何哉要之所謂明夷者不特遭時之昏暗人有蔽于物汨于情者皆足以傷吾之明也初九明夷之初也故君子見幾而避之六二離明之中正也故傷不至于甚而用拯馬壯吉馬者健順之物健則能正其志順則能晦其明其為吉也何有初九六二九三同離體也故皆言明夷之可以復自六四以上則坤體所以傷此明者也故于六五言利貞于上六言失則唯六四在坤之初近明夷之君故言能獲其心意則當出門庭以避之聖人惓惓為明哲之慮也如此學者其無惑于傳注之説哉家人卦説家人之卦不惟九五六二兩爻各得其內外之正位而六四一爻亦當其位焉同人之言柔得位得中謂六居二也小畜之言柔得位謂六居四也今卦惟二隂爻而一居二一居四可謂隂柔各得其位矣此彖辭所以言男女正而卦辭獨曰利女貞者也豈惟卦辭然哉六二以柔明居中故無所遂事而在中饋貞吉所謂惟酒食是議也六四以柔居巽下故能富家大吉所謂家之肥也夫子釋六二之吉既曰順以巽而釋六四之吉又曰順在位豈非女子之正莫大乎順哉常試論之正家之道莫若以嚴彖于父母皆謂嚴君而王假有家必歸于剛健中正之九五欲其嚴也家人過嚴而嗃嗃則雖悔厲而獲吉婦子嘻嘻而失節則必至于終吝欲其嚴也初九正家之始必防間而後悔亡上九家道之成威如終吉亦欲其嚴也嗚呼嚴則是矣其所以嚴者不可不知也風自火出風化自內及外之象也言有物而行有恆則風化之實係乎已之言行也上九先言有孚而後言威如誠信足以感之而後足以服人也夫子從而釋之曰威如之吉反身之謂也威豈剛嚴以求人之畏哉則亦在于反身之誠而已然則言行之不謹而自反之未至聖人固無取夫嚴也世固有嚴于處家而未知所以反身者或至于上下胥怨而父子亦不用其情豈易之所謂嚴哉睽卦説蹇卦説解卦説解震在上而坎在下動而出乎險也故為患難解散之義言利西南坤方之得衆而不言不利東北者解則無所不利也先儒曰無所往其來復吉謂難已解無所為則當修復治道也有攸往夙言謂尚有當解之事則早為之乃吉也其言大略與舊注同然求之彖所謂得中之辭則似有未盡其實所謂無所往其來復吉為下卦之坎言之也有攸往夙吉為上卦之震言之也方其在險而無所往故來復于中而吉以其陽剛之在中也及其出險而之震則有攸往矣故動宜早而往有功以其陽之初爻而可以動也其未解則來復蹇之所謂來反也其既解則有功蹇之所謂利見大人也蹇發其端而解言其詳不可不詳玩而深思也夫當既解之時已出乎險而動乎上故坎之三爻必有應于上為吉而以無應于上為有咎蓋無應則不能出乎險也震之三爻則以動之初終為等差雖動至于極而無不利蓋已出乎險非動則不足為解也易言吉凶悔吝生乎動故凡于震體必有戒之之辭今獨不然者以其自坎而進于震經歷險阻而後動則其動必不妄也初六當解之時以柔而上應九四之剛剛柔之相際也故無咎九二當解之時以剛中而上應六五之君羣隂之所歸附也故如田之獲三狐焉狐隂類謂初六六三上六三隂爻也得黃矢貞吉則以其得中直之道也六三當解之時而上無應又以六居三隂柔不能解難而僣居陽位者也故如小人乘君子之器適足致冦而已此下坎三爻之别也九四當解之時而在震之初宜其足以解難也然以陽處隂其位未當僅能出乎坎而又下應初六故但能解而拇言所解者在下而微也陽剛而動進而不已則朋類自孚故又曰朋至斯孚六五去坎既逺乂以柔在震之中下與九二之剛中為應則動協于中而能有解者也雖小人亦交孚而退聼故曰君子維有解吉有孚于小人上六以隂柔之至而在震之極當解之時動而不過者也隼髙飛之禽又在髙墉之上似未易獲也而君子待時而動雖射隼髙墉而獲之則其能動而有成可知矣此上震三爻之别也夫子于此所以詳言君子待時而動者正所以發明震動之爻為天下萬世訓耳損卦説陽實有餘而隂虛不足故損益之卦皆以損陽益隂為義損自泰來者也損三之陽以益于上故下乾變而成兑上坤變而成艮所以謂之損以其損下而益上也益自否來者也損四之陽以益于初故上乾變而成巽下坤變而成震所以謂之益以其損上而益下也莫吉于泰而益上則損莫凶于否而損上則益則是上可損而不可益下可益而不可損明矣損下益上固非聖人之所欲也然無君子莫治野人無野人莫養君子則損下有時而不能免此損之名所以不廢于易也許行謂滕有倉廪府庫以為厲民而自養者知損下之不可而不知易之所謂損也損之一卦雖以下卦之陽益于上卦為名然艮體在上有知止之義兑體在下有説順之義上知止則無過取下説順則非強從上止而下説然後可以為損則夫非止而説者烏可以損下哉益之彖曰損上益下民説無疆今損下而下亦説則損之道豈剝下奉上之謂哉故損之所謂有孚以三陽三隂之相應而交孚也上下交孚則元吉而無咎矣所謂可貞以二五之正應也九二剛中則能應乎上六五柔中無求于下斯可以有攸往矣是亦以其上知止而下説順爾曰曷之用謂在上而知止無所用于益也曰二簋可用享謂在下而説順雖二簋之微亦以享于上也曰損下益上其道上行言陽在上有以先之也曰二簋應有時損剛益柔有時言説應于下其損有時而非過于損也此卦彖之大意若夫六爻雖以損剛益柔為義亦各因兑艮二體而為之辭初九陽居陽位在兑之始而應于六四其損下以益上必矣損不可過故戒之以已事則當遄往酌而損之可也九二以剛中而應于六五亦損下以益上者也説而應乎正則利過此則凶故不損而益之則為不失其中矣六三在兑説之極居損剛之位故曰三人行損一人言下爻三陽而損此一爻也一人行則得其友言九居上而六居三則一陽上行六三有應為得其友也象曰三則疑者言三陽之盛極必損故疑之也此皆以兑體言之也六四以隂居隂在艮之始而下應于初知止而不妄求者也故初之益上其損雖疾而此無過求焉則彼己已事而遄往此亦無咎而遄有喜矣舊注古者元龜直二十大貝雙貝曰朋故曰十朋之龜六五在艮之中柔得尊位下應九二又剛上而尚賢故或益之多雖十朋之龜弗能違也象曰自上祐也而不言九二之應者益上之爻止以上九為主也上九雖在六爻之極而實艮止之陽非過亢者也損終必益而又為益上之爻故不損而益之非特無咎利貞而已且利有攸往而無有內外無不臣服宜矣此皆以艮體言之也益卦説損之卦辭曰有孚元吉無咎又曰可貞利有攸往又曰曷之用二簋可用享諄諄于訓戒之際蓋如此至益之卦辭乃曰利有攸往利涉大川兩語而已是知當益之時上以順而益下下以動而應上上損而下益自然無所往而不利所以其辭寡也損以下卦之陽而為上卦之上九則上九者損之所由以成也故上九弗損益之利有攸往而六五比于上九乃有十朋之龜弗克違之吉象所謂自上祐者言自上九以益于六五也益以上卦之一陽而為下卦之初九則初九者益之所由以成也故初九利用為大作元吉而六二比于初九亦有十朋之龜弗克違之吉象所謂自外來者言初九之陽本自外卦來而為益也或曰自上祐或曰自外來其言損陽以益隂則一也然損之六五謂之元吉而益之六二謂之永貞吉者益以六居二隂柔之至故戒之以永貞也易中諸卦或言利有攸往或言利涉大川未嘗併是二者而言也卦辭雖言利矣而爻辭或未必曰利則利故未嘗輕言也惟此卦辭既併言利有攸往利涉大川而初九又曰利用為大作元吉六四又曰利用為依遷國至于六二曰王用享于帝六三曰用凶事無咎豈非益下則利乎九五剛健中正位乎天位又以巽體而得六二之正應損上益下之主也故剛實有孚而惠發于誠心勿問而自然元吉下亦懷我之德而大得其志此蓋益道之大也上九以陽剛而處益之極有求益無已之意外卦之陽既以下益而為初九則上固不可復求益也故莫之與而傷之者至而象亦推言益之來本自于外也是以初九六二六三皆震體而在下卦蒙益者也故三爻皆吉而無咎震之成卦由于初九則初九震之主可以有為者也故在益之時則利用大作六二居震體之中而近初九之陽得十朋之益者也而又上應九五故有享帝之象六三居震體之極幾于躁動而凶然有上九之正應則是有孚也六雖居三而應于巽動必以順是中行也是以告于公上而逹其誠上下之所固有也雖用之凶事以濟大災亦無咎也四本陽爻也損其陽而下益于初故為益則四者損剛之位也又下有初九之正應故六四雖柔而不失于中行是以告公上則九五之所樂從也四本陽而移于初有遷徙之象焉故曰利用為依遷國亦以其志之在于益下也然則損上益下之惠其本發于九五有孚之心而其效見于大作享帝救災遷國之際有天下國家者其可一日不知此理哉夬卦説舊注曰揚于王庭其道公也故先儒因之曰小人衰微君子道盛則當顯行于公朝然彖釋揚于王庭乃曰柔乘五剛何也蓋大壯四陽也君子雖道盛而九五之德猶未同也故戒其利貞而未足以決去小人夬則五陽也四爻以陽剛之德進于下而九五以陽剛之德應于上有剛中之君以為之主然後可以出命而決去小人也曰揚于王庭謂必有君命而後可也曰柔乘五剛謂必有五剛而後可以決柔也自昔君子恃其公論之勝鋭于誅斥小人而不量其君之不足以有為未有不召禍者不知易之過也曰孚號有厲言雖有君命又當至誠誡號于衆彼知決去小人之難而或有危厲也曰告自邑言當自治以盡其在我者也曰不利即戎言不勝其忿而以兵戎則適以趣亂也唯知其難如此其利害如此然後可以決去小人故曰利有攸往此乾下兑上聖人所以默寓健而説決而和之意也使徒健而不説決而不和何足以成事哉大壯之初九曰壯于趾征凶戒乾陽之輕進也今夬之初九曰壯于前趾往不勝為咎當夬決之時戒之尤切也大壯之九二曰貞吉陽居隂位而在乾之中剛而不過故言其正則吉也今夬之九二曰惕號莫夜有戎勿恤言當夬決之時尤戒于陽剛之過故必惕懼誡號而後可以無憂也大壯之九三曰小人用壯君子用罔貞厲羝羊觸藩羸其角以其處健之極重剛不中故詳言用壯不用壯之得失以戒其剛之過也今夬之九三曰壯于頄有凶頄觀也壯于頄則怒之見于靣者也欲決小人而輕發易怒取凶之道也是小人用壯也君子夬夬獨行遇雨若濡有愠無咎言君子當其可決而決之其處已雖已特立獨行而其待小人未嘗不和雖若為小人所濡而可以有愠然決之而和何咎之有亦所以明用壯之得失為君子訓也大壯與夬皆陽盛之卦而下卦皆乾故其爻辭略同而于夬戒之尤至可見聖人之心惓惓于君子小人之際也九四陽居隂位又以兑體而乘乾陽之剛乘剛則不能安故有臀無膚之象隂柔則不能進故有行次且之象宜其有悔也然能牽引下卦之三陽以助九五之決則可以無悔故曰牽羊悔亡亦大壯以羊喻剛之義也聞言不信則以其兑隂之體也九五剛健中正而下有諸陽之助故其于柔也當決而決如莧陸之易去要必中行而後無咎也象所謂中未光者亦恐其決之過也上六處夬之極小人必去不必誡號而小人之凶可必也故曰無號終有凶又所以深為小人戒也姤卦説臣嘗于復卦論立卦之名以為聖人于一陽之生曰復謂本有而復來有幸之之辭于一隂之生曰姤則若始相遇然有惡之之辭蓋聖人進君子退小人之意也今觀姤之卦辭則此意益可知何則陽至于四畫而後謂之大壯隂始一畫爾而卦辭已曰女壯又戒之以勿用取女彖又曉然釋之曰不可與長也則聖人防微杜漸之意為何如哉姤之初六即坤之初六也坤一交于乾而為巽故有天地相遇品物咸章之理然方來之隂漸長則為遁又長則為否極而至于六五則為剝矣剝則其凶有不可言者故聖人于其微而戒之坤之初六曰履霜堅氷至而姤之卦辭曰女壯勿用取女其意一也柅止車之物也以金為之固之至也豕隂躁之物也當羸弱而猶蹢躅則其性然也初六之辭曰繫于金柅貞吉言一隂之長當固止于初則吉也有攸往見凶言浸長不已則為凶也羸豕孚蹢躅言雖應于九四有剛柔相孚之意然其中實躁動不可謂隂之微而忽之也既言固止之為正吉又言其不止而往則凶其為小人之戒明矣猶恐常情忽于其微而不戒也復言羸豕之蹢躅以見小人之情狀嗚呼聖人之慮天下後世何其切哉當姤之時小人故不可使之進為君子之計亦不可無以畜小人也故聖人既戒初六之不可征而又于九二九四九五皆言所以包制隂柔之理魚隂類也九二比于初六故言包有魚則無咎九四逺于初六故言包無魚則起凶杞髙木而大葉瓜則生于地者也九五剛中在上而初六在一卦之下故有以杞包瓜之辭九三重剛而不中在下卦之極近于驕亢而不能蓄下者也故居不獲安而進亦不果惟自知危厲則可無大咎上九以陽剛而居一卦之終尤髙亢而不能蓄下者也故如角之窮而不免于吝幸其去隂之逺可以無咎而已皆所以為君子待小人之訓也雖然九二之言不利賔何也賔者主之配也爻之隂陽固欲其相配惟姤之時則惟恐一隂之長故義在包制柔而豫防之不可與之為配以引其進也與卦辭所謂勿用取女之意同獨此時為然也故曰不利賔又曰義不及賔也九四之言逺民何也文言論乾之上九曰髙而無民謂下無隂也繫辭論陽卦之竒曰陽一君而二民謂二隂畫為民也今五陽而一隂在下固非無民九四當與之為應而近已為九二所包故曰逺民也九五之言含章有隕自天何也含章者坤順之道也九五之制一隂能如以杞包瓜則隂必不至于剝陽而有坤順之美不然隂長而無以包制之則剝道將成而九五非所利矣故曰有隕自天所以豫為之戒也象曰志不舍命者雖當五陽之盛可以包制一隂而必立志自我恐懼修省而不敢忘難諶之命也説者或謂有隕自天為天之生賢或謂天降之祥或謂有隕越者自天隕之豈未之思乎萃卦説陽居五而五隂從之故為比陽居五與四而四隂從之故為萃二卦若相似也然聖人于比之彖止言下順從以明下卦坤順之美又言剛中以明一陽之在五而殊不及坎險之義至萃之彖乃曰順以説剛中而應則併兑説坤順二體言之何哉比者衆隂始附之初聖人作而萬物覩之時也以一陽之在尊位而上下應之故專以剛中下順為言而不及于坎險非無取于坎也方其剛中未出于險則可見天下之始附雖不言險而坎險之實寓焉故曰原筮元永貞無咎又曰不寧方來後夫凶又曰先王以建萬國親諸侯皆始附之意也萃者二陽相比羣隂聚而歸之君臣同德而萬物盛多之時也非下順而上説則不足以為萃豈止二五相應而已哉此所以必兼言二體也所謂利見大人亨利貞言君臣陽剛同德之利見也所謂王假有廟用大牲吉萬物盛多而後能傋禮也所謂利有攸往順天命者上説下順則動無迷于天理也是故六爻之義皆以隂陽相應相比為吉蓋當説順萃聚之時説極則易憂順極則易乖聚極則易散君子所當警戒不虞而有惡于不相親也當萃之初隂必聚而歸于陽今乃以六居之則是陽位而隂爻也故有孚而不終陽實不足也志亂而若號隂柔而不能無疑也然而上有九四之應進而相遇則握手一笑可矣無憂而往則無咎此言初六雖不當位以有應而無咎也九四以陽居隂位而應于初六故亦曰大吉無咎象又曰位不當也六二隂柔得中得位而應于九五者也故能引初六之隂以享于上故曰引吉無咎孚乃利用禴禴祭之簡薄者言誠意足以享上也升之九二亦應于六五則亦有孚乃利用禴之辭其義一也九五陽剛得中得位而應于六二者也故其萃有正應之位不待相孚而無咎惟元永貞則悔亡也比以九五一陽為主故卦辭有元永貞之言萃有兩陽爻故元永貞獨歸之九五亦可見易中卦爻彖象之辭無非一理所貫也六三隂不當位處順之極而上無應其乖易致故萃而嗟無有所利然當萃之時而上比于二陽為可親也故又言往則無咎小吝而象亦曰上巽也上六隂柔之至處説之極而下無應其憂易生故至于齎咨而涕洟然當萃之時而下比于二陽終得其所親也故卦辭曰無咎而象亦曰未安上也雖然九五之萃有位而象以為志未光何也九五萃之主也九四之所比而衆隂之所由以萃也而其應獨專于六二之一爻則是有位所應為有限其志為未光豈易所以為萃乎聖人慮後世泥于剛中而應之辭而不深察夫順以説之理故于九五之象發之升卦説艮止也坤順也艮有不自滿之意故內艮外順而為謙巽入也亦順也巽有不自髙之意故內巽外順而為升以其謙也故曰地中有山以其升也故曰地中生木其為自卑自下則一也謙之六爻言吉者三言利者三而無凶悔吝之辭升之六爻言吉者三言利者三九三雖不言利與吉而亦無凶悔吝之辭雖以上六之冥升亦利于不息之貞則內巽外順之效雖然巽在坤下不言地中有木而曰地中生木者巽有漸進之義木之生于地則亦以漸而已故又曰君子以順德積小以髙大然則非巽而順安得謂之升哉初六以柔居一卦之下又巽之主合于上卦之坤柔宜升者也故曰允升大吉言其必可升也九二在巽之中而以剛中應于六五故曰孚乃利用禴言其誠之足以享上也與萃之二五相應而曰孚乃利用禴同意九三以陽剛居巽體之上而正應于上六往無所疑也故曰升虛邑言其莫之違也六四與初雖非其應而以巽柔上合于同類之坤非無民也故如太王之享于岐山六五雖柔居尊位而下有九二之正應故貞而獲吉如升階之易夫子于諸爻之象曰上合志曰有喜曰無所疑曰順事曰大得志無非以其上下巽順之相應也上六以坤順之終而在升之極昧于進而不知止者也故曰冥升然進德則不厭于升也故又曰利于不息之貞坤柔惟患不能永貞今貞而不息則何不利之有象所謂消不富者如不富以其鄰之類言坤之隂虛也冥升而不知止則消矣欲其弗消唯不息之貞乎困卦説陽剛陷于二隂之間故曰坎卦唯三陽而皆為柔所掩故曰困雖然坎上巽下亦柔掩剛也而必兑上坎下乃謂之困何哉天下無常困之理君子有處困之道困雖君子之所不能免也而不失其所亨則必有道也坎險也兑説也在險而能説則無入而不自得矣其于處困也何有此聖人名卦垂訓之意也故夫成卦雖以柔掩剛為義而六爻唯陽剛而後為善蓋非陽剛不足以出乎困也初六以隂柔在坎險之下故臀困于株木入于幽谷三嵗不覿言不足以出險也六三以隂柔在坎險之極而又承乘皆剛故曰困于石據于蒺藜入于其宫不見其妻凶言進退皆不可而上六亦不應也九二以剛中而合九五然陽居隂位在坎之中未能出險故曰困于酒食朱紱方來利用享祀困于酒食如需于酒食之意言未可以有為也朱紱王者之服利用享祀言其剛中有合足以享上也可以待上之來求而不可以求合于上故又曰征則凶而無所咎此皆因坎體而為之訓也九四以陽居隂其位既不當而下有初六之應其柔又不足以出險故有來徐徐困于金車之吝然而曰有終者則以其體之説才之剛也上六以隂柔之至在困之終説之極故困于葛藟于臲卼然而曰動悔有悔征吉者言動而能悔其有悔則往而可以出乎困也亦以其在險能説而困極則通也唯九五以剛健中正居説之中為卦之主而下有同德之九二善處困者也故雖上下皆掩于隂如劓刖之傷而不失其説而利也赤紱人臣之服在困而于赤紱則君能下下也乃徐有説利用祭祀言君臣相説則其中受福也此皆因兑體而為之訓也九二言朱紱方來利用享祀而九五言困于赤紱利用祭祀于以見當困之時唯君臣交孚而後足以有為也要之五爻皆不言吉而獨于上六言征吉處困之道要當俟時而不可欲速也聖人于九二曰征凶于九四曰來徐徐于九五曰乃徐有説而于上六始有征吉之辭則處困而求出乎困其可以欲速哉井卦説坎與乾坤震艮巽離兑交而成七卦反對而成十四卦坎又自重而為一卦然坎上之卦凡八惟比取五隂之附一陽既濟取水火之相交為義其餘震遇坎則為屯乾遇坎則為需艮遇坎則為蹇兑遇坎則為節坎遇坎則為習坎皆取遇險之義至于巽遇坎乃獨以為井何也井亦坎陷之義也以巽入而在坎陷之下其隂柔不足以濟險也故聖人不言險而特取巽水上水之象以明巽之亦可以出險而濟物也孔子于屯曰動乎險中大亨貞于需曰剛健而不陷于蹇曰見險而能止于節曰説以行險于坎曰行險而不失其信皆示人以處險之道也于井雖不言險而曰巽乎水而上水井是亦出險之意也卦既以巽能出險為義而井又以上出為用此井之六爻所以惡下而欲上其次第皆可得而言也初六以隂柔居巽之下而無上應入而不能出者也故有井泥不食舊井無禽之象九二居巽無應而比于初趨下而不能上者也故有井谷射鮒甕敝漏之象九三陽剛得位而在巽之上又有上六之正應故雖井泄不食而可以汲能求王明則受福矣至于六四隂柔雖不能濟物然出乎下卦之上而又柔得位故如井之甃能自修而可以待用九五陽剛中正雖未出坎而為坎之主所謂天一生水者也其兼濟萬物實本乎此故如井冽寒泉之可食而象有中正之辭上六居坎之上又在一卦之上水已上井而可濟物之象故曰井收勿幕言汲取之不可覆幕也雖然上六言井收勿幕而繼之以有孚元吉則又何也天一生水而為坎坎陽卦也故井之六爻每于陽爻則言水如九二射鮒九三之可汲九五之寒泉皆以水為言也初六在下而乃曰井泥六四雖當位而第曰井甃皆言井而不及水則以其二爻皆隂也上六雖亦隂爻而下與九三為應陽實有孚而應在于上也水之上出莫此為吉此所以為元吉而孔子以為井道之大成也嗚呼知有孚之辭為九三而言然後可以論井養不窮之理矣革卦説甚哉革道之難也兑澤也水也坎險也亦水也革之為卦既取水火相息為義然不取坎上離下而取兑上離下者以變革之難非內明而外説則不可也內明則見理必盡外説則無咈于人情不如是而能革者未之有也卦辭曰已日乃孚言革之初未必孚也曰元亨利貞悔亡非元亨利貞則必有悔也孔子從而釋之曰革而當其悔乃亡則革而不當未有無悔者也當革之際求信之難如此求其無悔之難又如此則革其可以易言哉卦之六爻唯二五中正相應所謂大亨以正者也故六爻之中唯此二爻為善蓋以六居二而在離明之中則所見不偏必無過舉故曰己日乃革之可以征吉而無咎以九居五而在兑説之中則所存剛實必無不信故一時丕變如虎文之炳著雖未占而有孚下言征吉上言有孚則中正相應之辭也當革之時而必在于內明外説居中得正而又上下相應則革道之難益可見也是故初九以陽剛當革之初未可革而欲革者也故曰鞏用黃牛之革而象曰不可以有為言當固守中順之道也上六以柔順而當革之終從九五而革者也故曰君子豹變小人革面而象亦曰其文蔚又曰順以從君言革道之成君子從上之德如豹文之類虎而小人亦革面以從君也其曰征凶居貞吉者又言革之不可以過也至如九三陽剛而不中故有征凶貞厲之戒必革言三就而能從衆然後可以有孚九四以陽居隂位故必悔亡而後有孚可以改命皆所以明革道之難也噫後世好名喜功之説勝君臣往往厭于持循易于改作而不復知聖人所以畫卦垂訓之意雖欲無悔得乎哉
