body:
  text: 易説卷四宋趙善譽撰下經二鼎至未濟鼎卦説易中以畫取象命名者唯三卦頤也井也鼎也其取象雖不同而皆有飬人之義豈非飬人之利博故特取象以示人邪頥取諸身者也故以艮止震動為卦井與鼎取諸物者也故以木巽水則為井以木巽火則為鼎其取義雖不同而皆以上爻為吉豈非致飬之道必于其終而後見也就三卦之中而别之唯井鼎之義最為相近水以汲而出井為用故上六勿幕而元吉食以亨而出鼎為用故上九玉鉉而大吉井以陽實為天一之水故九五言井冽寒泉食鼎以隂虗為耳受鉉之象故六五言黄耳金鉉利貞皆以在上為吉也井以初六為泥鼎以初六為趾皆以在下為言也井之九二无應故言谷射鮒而甕敝漏鼎之九二有應故言有實而終无尤井之九三有應故言井渫不食而可用汲鼎之九三无應故言雉膏不食而其行塞井之六四不應於初故為井甃无咎鼎之九四與初為應故為折足覆餗此則以其剛柔之應否而異其辭也要之鼎以虗受物耳以虗受鉉皆惡夫實而自滿也九二九三九四鼎也皆陽實也故二以有實而招疾三以行塞而不食四亦折足而覆餗皆以其不虗也以九處二陽非其位而比於初六之隂宜其招仇而見疾也然在㢲之中而上有六五之正應初之所不能害也故能謹所之則終无尤以九處三而上无應陽剛之過不惟如鼎之已實不能有容其耳亦實而不行矣故必如方雨而和則悔虧而終吉以九居四陽亦不當位而在重剛之上又下應初六之隂柔不唯剛實自滿而且折其足矣故至于覆餗而形渥三爻之位雖不同其戒于實則一也六五耳也宜虗而受鉉者也宜虗而以隂居之又下有九二陽剛之應是黄耳而得金鉉也象曰中以為實者以其居中而虗所以能納剛中之實也上九鉉也以九處上居隂履柔而在鼎之終故剛柔得宜而有玉鉉之象此鼎道之成而飬人之功博也故曰大吉无不利而象亦曰剛柔節也若夫初六之在下趾也以隂柔而居之弱而顛之象也然在鼎之初則為出否取新之時故雖顛而將以有用如得妾以其子而无咎也及其鼎已有實則不可顛矣故九四應之則有折足之凶義各有取也震卦説一陽動于二隂之下而為震故震有亨之理雷洊至則威益加故震有恐懼之義要之吉凶悔吝生乎動者也一渉于動而吉凶悔吝随之則動豈可以不懼乎􅊒􅊒恐懼貌啞啞笑而不敢出聲之貌震雷􅊒􅊒言其動而知懼也笑言啞啞言其懼以致福雖喜而不敢肆也此君子處震之道也初九一爻震之主也又在一卦之初故其辭與卦下之辭相同益可見動之不可不謹也陽剛而動猶在所戒則以隂爻而居震體可不戒乎六二隂柔也在動而乗剛危之道也故曰震來厲以柔而動鮮能無失故曰億喪貝以其乗剛之危故有躋于九陵之象以其七變而下卦為艮則知止而不至於妄動上㢲下艮其卦為漸則動而不窮者也故有勿逐七日得之辭言必至于艮而後可以无失所以深戒之也六五亦隂爻也來則乘九四之剛往則動極必危故曰震往來厲然以六居五爻雖隂而位則陽也隂陽相濟而居尊得中亦可以无失而有為也故曰億无喪有事言非在中則不可以有所事亦所以深戒之也蘇蘇神氣驚惕散緩之貌也六三在下震之上妄動而未至於甚者也故必震蘇蘇而後可以有行而无眚索索自失之貌矍矍不安之貌也上六在上震之極妄動而不已者也故雖震索索視矍矍而有往則凶其曰震不于其躬于其鄰言未及其身則當先戒也婚媾有言以其在動之極雖驚懼之早猶不免於小有言也甚言動之不可不戒也若夫九四雖以陽剛在上震之下然以陽居隂位又承乗皆柔陷於隂柔而不能奮動之象非初九之比也故曰震遂泥而象亦曰未光也鳴呼孰謂君子之動而可以不戒懼乎艮卦説先儒之言曰艮一陽居二隂之上陽動而上進之物既至於上則止矣隂者靜也上止而下靜故為艮也或曰艮一陽為主於兩隂之上各得其位而其勢止也又曰人之所以不能安其止者動于欲也艮其背止於所不見也不獲其身謂忘我也行其庭不見其人謂不交於物也艮之取義備於此矣雖然重艮之義則未之詳也易以上下卦而分内外者也下卦為艮止於内也上卦為艮止於外也止於内則私欲不動故曰艮其背不見其身止於外則私欲不行故曰行其庭不見其人卦之六爻二陽四隂而皆不相應内外兼止艮之至也故曰艮其止止其所也上下敵應不相與也无非為重艮而言之也是故爻之次序雖以趾腓夤身與輔為象其實下三爻皆以止於内為言而上卦四五兩爻皆以止於外為言唯上九在一卦之終處重艮之極則有内外兼止之辭焉初六之艮其趾止於未動之初也六二之艮其腓則不能自止而随物以動者也九三之艮其限列其夤不能止於初而力止於終者也然初六之象曰未失正謂私欲之未萌也六二之辭曰其心不快九三之辭又曰厲薰心則三爻皆以止於内者為言无疑也六四之艮其身謂躬之所行也六五之艮其輔謂口之所言也言行見於外者也故能止之則於四為无咎於五則言有序而悔亡矣此二爻皆以止於外者為言无疑也動不可過故震之上六則凶止不患於過故艮之上九則吉曰敦艮之吉以厚終者言艮止之極斯能敦厚而有終也此内外兼止之極至也然則艮止之學要必明乎重艮之義哉漸卦說地中生木謂之升以其㢲而順也故曰柔以時升㢲而順剛中而應是以大亨山上有木謂之漸以其止而㢲也故曰漸之進也其位剛得中也止而㢲動不窮也㢲貴卑退而與坤順艮止相遇又有地中生木山上有木之象此其所以曰升曰漸皆以上進為義而尤取于剛中而應也君子觀升之象而以順德積小以髙大觀漸之象而以居賢徳善俗則進徳之要非卑㢲其可哉雖然㢲長女也艮少男也以男下女則女歸之象也天下之事進必有其漸然亦有不以漸者唯女之歸非漸則不可故曰漸女歸吉言必如女歸之有漸則吉也其曰利貞者以二五中正之相應也六爻皆言鴻漸者鴻之進最為有時而其飛翔亦且有序皆漸之義也卦之明漸以女歸言象之明漸以木言爻之明漸則又以鴻言以此知易之取象要以發明天下之理不可執一而觀也干水涯也磐水中石也初六六二皆艮體不妄進者也故初則漸于干小子以為危厲且有言而君子之義則无咎也二則漸于磐飲食衎衎以其居中知止而又有九五之應故可樂也九三在艮之極而以陽居陽位止極而動不能自止者也故如鴻漸自水而逺之于陸无應于上而比于六四非其配也故有夫征不復婦孕不育之凶曰利禦冦者言九三六四雖不可以為配然艮止㢲順可以相保而无害也六四自艮而之㢲自下卦而之上卦如鴻之自陸而之木也柔得位而在㢲之下无所往而不安也故雖漸于木而㦯得其桷无咎九五自木之陵則其漸益髙矣剛中得位而下應六二故雖有六四九三之間而終莫之勝也九三比六四故以夫征婦孕而言九五應六二而中有間之故以婦三嵗不孕為喻皆因卦有女歸之象而爻有隂陽之配而已升自下而上者也至上六則曰㝠升惡其升而不已也漸亦自下而進也至上九則曰鴻漸于陸其羽可用為儀吉以其進而知退也上九雖居一卦之極而在㢲之上㢲非好進者也故雖如鴻之自陸已漸于木于陵而復漸于陸則進退可觀矣嗚呼君子所貴于㢲者如此哉歸妹卦說震長男也兑少女也以少女配長男故曰歸妹然兊下而震上非男下女之義故曰征凶无攸利聖人於漸曰女歸吉於歸妹曰征凶所以埀訓者明矣大抵兊隂卦也隂柔而說則常患乎不正故兊下之卦陽爻多吉而隂爻多凶如臨如睽如兊如中孚等卦皆然而履之三爻尤與歸妹之三爻相似皆恐其隂柔之過於說也履之初九曰往无咎此則曰征吉履之九二曰幽人貞吉此則曰利幽人之貞履之六三曰𦕈能視跛能履此則於初言歸妹以娣跛能履於二言𦕈能視而三則曰反歸以娣亦以六三之柔不如在下之陽爻也履為君子踐履之訓而歸妹為女之從人之訓其恐過於隂柔以求說則一也雖然初二兩爻皆陽也而謂之跛眇何也歸妹之時上下卦皆隂爻為主初二雖陽爻而在下實娣之象也况在兊體亦不盡専其事故不過如跛能履眇能視而已在君子之踐履則以跛眇為非故併言於六三在歸妹之娣則以跛眇為當然故析言於初二其實皆因兊體而為之戒也六三隂不當位而處兊之極柔邪以求說賤者之事也古者謂賤妾為須歸妹而以須之事豈婦人之正哉故曰反歸以娣言不若初九九二之娣為正也九四在震之初動之本也婦人以靜正為徳動而求歸則非正也故雖歸妹愆期而不可不堅其待時之志也六五雖在震體而居中得尊位上卦之主也又下有九二之正應帝乙歸妹之象也其君之袂不如其娣之袂良言其柔中之徳不事乎飾也月幾望吉言必如月之幾望則不至與陽敵也上六隂柔之至在歸妹之終而處震之極夫婦失道之象也故所承无實刲羊无血而不足以奉祭祀此皆因震體而為之戒也震上兊下雖有歸妹之象而兊說震動皆不可以不戒此所以征凶而无攸利者也豐卦說交泰時之盛也初四二五皆以剛柔相應為吉而九三在下卦之極上六在上卦之極則皆有戒之之辭慮其泰之極也豐大亦時之盛也初四二五剛柔雖不相應而以明動相應為吉至九三上六亦以明動之極而有戒之之辭慮其豐之極也豐之初九九四皆剛也剛則不相應然以明之動則无嫌于同類也故以初遇四則為配主以四遇初則為夷主夷等夷也亦配之義也曰雖旬无咎往有尚旬均也言雖均為陽爻而往則有尚也曰吉行者亦往有尚之意也此初四明動之相應也六二六五皆柔也柔則不相應然以明之動則亦无嫌子同類也故以二應五雖其往有不應之疑而六二中正上合六五之柔中則二五交孚矣故曰有孚發若信以發志也以五應二雖六五柔在尊位而能下接六二含章之柔則柔來而有慶矣故曰來章有慶譽吉九三離明之極也明極則暗故至于豐其沛日中見沬折其右肱而无所咎沛謂幡幔之屬沬謂星之小者也上六動之極亦豐之極也豐極則暗動極則凶故至于豐其屋蔀其家闚其户闃其无人而三嵗不覿凶蔀者覆障而致闇之謂豐大其屋謂滿假也蔀其家謂昏暗也滿假而昏暗則人无助已者矣宜其无所覿也曰天際翔者言其髙亢也曰自藏者言其自取之也大抵豐卦六爻唯初九六五不言豐而皆吉六二九三九四上六皆言豐而有見斗見沬闚户无人之戒以是知居豐大之時而有其豐者皆非善處者也故卦辭曰勿憂宜日中非中則有憂也彖曰天地盈虗與時消息則豐固不能常也雜卦又曰豐多故也則无事之時實多事之基也可不畏哉旅卦説離下震上明以動也其卦為豐豐之上九曰闚其户闃其无人豐大者必失其居也故豐之反對則其卦為旅以其止而麗乎外也山止而火行則有旅之象止而麗乎外則有旅之義豐極而失其居則有旅之漸此所以名之曰旅也豐震在上陽用事也故曰豐大旅離居上隂用事也故曰小亨處旅之道莫若正故曰旅貞吉六二柔中得位旅之正者也故有即次之安有懐資之用又有童僕之助則以其正而已六五柔得中而合于二亦旅之正也故能一發而中于離明之德下以得人之譽而上以得天之命則以其居離之中能自上以逮于六二之正也其他如初六九四皆不及于中者也故初則𤨏𤨏取災而四則其心不快九三上九皆過于中者也故三以陽近離而有旅焚其次之言上以陽處高而有鳥焚其巢之象三言喪其童僕則視夫得童僕者異矣上言先笑後號咷則視夫終以譽命者逺矣牛以負重致逺亦旅之所資也今以陽亢太過之故而喪牛于易豈復知所以處旅之道哉故卦辭曰喪牛于易凶而象曰終莫之聞也嘗試推之噬嗑之利用獄豐之折獄致刑皆以有震之威離之明也然噬嗑之後繼之以賁豐之後繼之以旅則離明如故而震為艮止明矣明无時而不然威有時而當止故聖人于賁之象曰君子以明庶政无敢折獄于旅之象曰君子以明慎用刑不留獄知聖人无敢之辭又知聖人慎而不留之辭則知震變為艮之義矣易言用刑之卦反對相繼者唯此四卦而其象辭切至如此則用刑之際可不謹哉㢲卦說以卦言之則上下皆㢲取其上以㢲出命而下以㢲順命也以畫言之則二隂爻皆在一卦之下而順乎陽取其從命之順也以其重也故有申命之辭以其二五皆剛也故有志行之辭㢲以柔用事故曰小亨然而剛中也故曰利有攸往利見大人大抵巽以柔順為用在上而㢲則可以接下在下而㢲則可以事上然皆不可過也初六居㢲之下卑退而不中故疑而進退然以六居初非專于柔也故曰利武人之貞九二陽不當位而最在四陽之下㢲之甚也故曰㢲在牀下然剛而得㢲之中不失為事上之道故曰用史巫紛若吉言如祭祀之用史巫可以逹誠也九三處下卦之極而又以陽居陽位雖㢲體而不能㢲者也故頻㢲吝言其頻失而頻㢲也此為在下之㢲言之也六四以柔隂之至而出乎下卦之上能以其柔㢲而接下者也故悔亡而下卦之三爻亦皆順之如田而獲三品也九五剛健中正而居㢲之中盡㢲之道得位得中而能行權者也故貞吉悔亡无不利雖其命令初有未善亦先後推究極其終始而後革之也故无初有終又曰先庚三日後庚三日吉上九陽不當位在一卦之極亦㢲之甚也故亦曰㢲在牀下非如九二之猶得中也故喪其資斧貞固則凶此以在上之㢲言之也世言甲庚之說多矣惟先儒所謂甲者事之始庚者有所革也自甲至戊己春夏生物之氣已備庚者秋冬成物之氣也故有所革其説至當不可易也嘗試推之當㢲順之時有申命之審宜其出令之無不善也亦無不從也而聖人于九五剛中之爻必及于終始變革之說豈故于此以啓天下後世變法之患哉盖惟其㢲而後足以行權非㢲而行權則自是矣惟㢲而中正然後足以更變非㢲而中正則生事矣故曰剛㢲乎中正而志行又曰九五之吉位正中也善觀易者要必詳味于此兊卦說㢲兊皆隂卦也㢲曰小亨而兊不曰小亨者兊之柔在外也剛中而柔外則其說不失於正故曰兊亨利貞其所以重兊為兊者上以說使下而下以說應上也兊雖坤之三索而成卦陽剛實為主於中故六爻之吉者唯在於陽爻九五亦陽爻也而有孚于剥之戒則以其居尊位而下無應也以卦言之則上下皆說有相應之義以爻言之則六爻皆不應此兩隂爻所以皆非吉而四陽爻獨於九五致戒也初九陽居陽位而在兊之初剛而不過者也故曰和兊吉九二陽居隂位而在兊之中剛實而有孚者也故曰孚兊吉悔亡六三隂柔而不當位非正以求說者也故曰來兊凶此以在下之兊言之也九四陽居隂位而不中又下比於六三之隂雖欲商度以説接下而位非所安也故曰商兊未寧然能剛介有守疾其隂柔則有慶矣故曰介疾有喜九五雖剛健中正而下與九二不相應非能得下之説也下無其應而比於上六信于隂柔小人者也故曰孚于剥有厲上六以隂柔居兊之極以不正之説而接引於下者也故曰引兊未光也此以在上之兊言之也上下之說雖不同其貴於剛中則一也六爻之剛柔皆不相應而九五君位獨以在下無應為戒作易之意可見也故曰説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉渙卦說前嘗論比卦一陽居五而未出乎坎故為天下始附之時萃卦二陽相比而下皆從之故為萬物咸聚之時今渙之為卦㢲順出乎坎險之上而二五皆剛中雖未至於萃聚之盛而視九五之猶在坎中者有間矣渙散也言能散夫險難也天下之難非陽剛得位則莫能濟故其下之始附也則為比其難之散也則為渙及其君臣同徳而下皆順從也則為萃固自有次第哉此雖吉而未至於亨渙則亨矣渙之亨不過曰王假有廟利渉大川利貞而已萃之亨則曰王假有廟利見大人亨利貞用大牲吉利有攸徃矣渙之言亨者一而萃則再言之渙之言利者二而萃則三言之渙言王假有廟而萃則加以用大牲吉之辭以是知比而後渙渙而後萃誠有其序也坎在㢲上以㢲而遇坎也柔㢲不足以出險故聖人不言險而取以木㢲水之象以為井㢲在坎上㢲而出乎坎也出乎坎則險難可出矣故聖人取濟險之象而言利渉大川乗木有功聖人所以為天下後世處險之訓者葢可見矣初六以隂柔居渙之初又在坎險之下不足以渙難者也故不言渙而曰用拯馬壯吉言必頼乎陽剛而後足以有濟也象亦曰初六之吉順也以其比乎九二之剛中故言順也九二在坎體而陽剛得中可以少安而俟時也故曰渙奔其机悔亡机所憑以安者也六三隂居陽位在坎之上而與上九為正應有出乎險之象焉故曰渙其躬无悔以其猶在坎體故所渙惟其躬以其有應於上故象曰志在外也六四在上卦之下而居近君之位㢲而出乎險矣故能渙其群元吉謂渙而後得衆也然以隂居隂柔㢲之至非能盡任渙難之事故有有丘匪夷之思言未能盡平其難也九五陽剛得位而在㢲之中故能渙散其難而使號令如汗之洽非如六四之猶有匪夷之丘以其居王位而无咎故曰王居无咎正位也上九當渙難之終陽亢自高而乗九五之剛則傷之者至矣故曰渙其血去逖出无咎言當已渙之時功成身退則可以无咎也㢲之三爻皆出乎坎險者也於六四曰渙有丘匪夷所思於上九曰渙其血去逖出而王居无咎獨歸之九五則渙難之道非剛中之君孰能盡哉節卦說人有所說則往而不能止以其順境在前也說而遇險則知止矣故兑下坎上其卦為節恐其說而至於過也以爻言之則二五皆剛中亦節之意也雖然渙亦剛柔分而剛得中也而彖獨言之於此何哉渙自否來九四之陽來居於二而六二之隂徃居於四也陽來居内故曰剛來而不窮柔往居四故曰柔得位而上同節自泰來九三之陽升而居五六五之隂降而三也陽升隂降而三隂三陽之分始均故曰剛柔分而剛得中也否變則泰渙則將泰之漸也故於剛言來而於柔言得位泰變則否節則制之於未否也故於剛柔言分而幸其剛之得中義各有在也節之為言制而不敢過也於節而又過之則亦非正也故曰苦節不可貞初九在兊之下而有應於上不可出而不出者也故戒以不出户庭則无咎九二在兊之中而無應於上可出而不出者也故戒以不出門庭則凶不可出而不出則不昧於通塞故象曰知通塞也可出而不出則為不知時故象曰失時極也六三在兊之極隂居陽位而又乗剛不知節者也說極則悲故不節若則嗟若无咎言皆自取之无所咎也上六隂柔之至居坎之上而又在節之極過乎節者也太過則苦故苦節貞凶悔亡言貞固則凶悔則無凶也孔子以又誰咎也釋三爻无咎之辭而先儒以悔則凶亡釋此爻悔亡之辭與他卦殊不同葢其文義如此不可得而同也初則戒之以出二則戒之以不出一處一出各有宜也三則戒其不節上則戒其太節過與不及其失均也唯六四以隂柔而應於初以坎水而就於下又上承九五之陽能安於節者也安則無所往而不通故曰安節亨承上道也九五居尊得位而剛健中正節之當者也當則無所往而不可故曰甘節吉往有尚以其在臣也故曰安曰亨言已能安之則亨也以其在君也故曰甘曰吉言施之天下而人皆羙之然後為吉也六三言嗟而六四言安上六言苦而九五言甘則節之道其可過而至於咈人情也哉中孚卦說小過卦說四柔在外而二剛居中柔過於剛也故曰小過以全體言之則剛中故亨利貞以二體言之則剛不中故可小事而不可大事也不宜上宜下謂飛鳥之遺音能順而下不能逆而上雖因六畫有飛鳥之象而言之要之震上艮下在小過之時宜過於止而不宜過於動也祖始也謂初也六二以柔在内卦之中妣也二在初六之上而以柔中過其祖而遇其妣也君謂五也二臣位也六與二皆柔而不如六五柔居剛位不及其君也以柔而居臣位遇其臣也柔雖過於初而得妣之中六與二雖皆柔不及於五而在臣之位故雖小過而无咎也宻雲不雨自我西郊隂唱而陽不和隂之過也弋而取其在穴隱伏之物弋之過也六五雖亦小者之過未能澤物而居尊得中動亦可以有獲所謂可小事不可大事也初六在小過之初艮止之下過而未形者也故先有飛鳥以凶之戒言其初之不謹則其終末如之何也上六在小過之終震動之極無所遇而過之甚也故終之以飛鳥離之凶之辭言其離於凶災葢自取也若夫九三九四兩陽爻非過者也故皆以弗過言之九三雖弗過而應於上六當小過之時不可以不防也不防則或為隂所傷故曰弗過防之從或戕之凶九四雖弗過而應於初六初雖未至于過而將過也故惟知相遇之有厲而戒之則勿用而永守于貞矣故曰无咎弗過遇之往厲必戒勿用永貞然則聖人於隂爻言過而於陽爻言弗過且有防之戕之往厲勿用之戒其為君子慮也豈不切哉既濟卦說坤上乾下為泰以天地之交也坎上離下為既濟以水火之交也以天地水火之象言之則既濟若未可以同於泰以乾坤之畫觀之則乾畫居坤之中而為坎坎者乾之中也故乾居西北而坎居正北坤畫居乾之中而為離離者坤之中也故坤居西南而離居正南乾坤不居正位而坎離居之則坎離者乾坤之大用也故泰之六爻雖相應而二五處非其位既濟不唯六爻相應而柔剛之位无一之不當以是爻而居是位則其應者皆正也水火相交而剛柔正應則其為既濟也豈不大哉易中諸卦六爻皆應者凢八泰否咸恒損益既濟未濟然其當位而應則惟既濟而已此所以小者皆亨而有初吉終亂之戒也知小者之亨則天下无可為之事知初吉終亂則天下有不可勝窮之憂以其剛柔之應過於交泰之時故其卦下初吉終亂之辭早於城復于隍之戒此聖人所以不畏多難而畏无難者也初九六四剛柔之相應也故初以陽剛當始濟之時雖曳輪濡尾而无咎以其有應而可以濟也曳輪謂其勇於行濡尾則初濟之象也四當水火之交雖有新繻而不棄衣袽之敝以其不忘濟難之始也繻謂繒采衣袽弊衣也六二九五亦剛柔之相應也二以柔中故雖有喪而勿逐自得五以剛中故雖薄祭而可以受福言當既濟之時中正相應則无往而不利也唯九三以陽剛在下卦之上居離之極有甲胄戈兵之象恃其既濟而欲以威服人者也故雖克鬼方而不免三年之憊泰之九三類也上六以隂柔在既濟之終居坎之極有窮而遇險之象恃其既濟而終亂者也故濡没其首危厲可必亦泰之上六類也未濟卦説未濟不特坎離之不交而已三隂三陽俱不當位又濟難之材非陽剛不能而其陽爻一極于卦外二揜于三隂之中皆不足以有濟也故曰无攸利又曰未濟男之窮也然而猶曰未濟者柔得尊位而剛柔相應今雖未濟而終必有濟者也初六在坎之下而以隂居陽位不量其材而妄欲求濟者也故曰濡其尾吝言其不能有濟也在未濟之初而妄以為可濟不能要其始終者也故象曰亦不知極也六三在坎之上而亦以隂居陽位亦不自量而妄求濟也故曰未濟征凶言往則凶也然將出乎坎而上有上九之應終亦有濟者也故又曰利涉大川六五雖柔不當位而虚中居上有九二剛中之應上以謙光接下下以孚實應上雖未濟而可以有濟者也故曰貞吉无悔君子之光有孚吉此皆以柔之不足濟難而為之訓戒也九二以剛中而應乎五可以有濟也然以陽居隂位則有不能進之象故曰曳其輪貞吉所以勉其行也九四陽剛出乎坎險亦可以有濟也然陽不當位而下應于初則亦有不能進之象故曰貞吉悔亡震用伐鬼方三年有賞于大國亦所以勉之也上九以陽剛居未濟之極而下有六三之應時之將濟交孚燕衎而可以有濟者也然剛柔皆不當位則燕樂之過至於牽惑没溺雖有孚而不足以乗時濟難矣故曰有孚于飲酒无咎濡其首有孚失是此皆惜夫剛之失位而為之訓戒也未濟于初六言濡尾之吝而于九二言曳輪之吉當未濟之始柔不足以有濟而剛中可以有行也既濟于初九則併言曳輪濡尾之无咎當既濟之初剛能有行以濟難則尾雖濡而无咎也因濟而言濡尾則同其未濟既濟則不同也既濟于九三言伐鬼方小人勿用恐陽剛之過而戒之也未濟于九四言震伐鬼方有賞于大國為其陽不當位而勉之也因離之甲胄戈兵而言伐鬼方則同其戒之勉之則不同也既濟之上六隂雖當位而在既濟之極故有濡其首之戒未濟之上九陽不當位而在未濟之極故亦有濡其首之戒隂陽之爻雖不同其在一卦之極則同也未濟既濟坎離之反對而成也未濟則必濟既濟則復至于未濟消息盈虚之理循環无窮此所以為易也
