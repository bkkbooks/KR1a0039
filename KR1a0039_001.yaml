body:
  text: 易説卷一宋趙善譽撰上經一乾至隨乾卦説卦之始畫也竒耦而已一與一為二故有竒則有耦二與一為三故三畫而成卦竒陽也三畫皆竒純乎陽者也名之以乾謂其健也耦隂也三畫皆耦純乎隂者也名之以坤謂其順也故曰乾陽物也坤隂物也易雖生于隂陽竒耦之畫然竒耦不相錯則乾坤判然二物何以見隂陽剛柔之用哉是以純乎陽則偏乎陽純乎隂則偏乎隂其純也固其所以為偏也况重乾為乾重坤為坤六位皆純而健順之至聖人作易得不為之慮乎故今乾坤二卦諸爻皆有惕懼警戒之辭而惟二五之中爻則否誠慮其或偏也吉今説者往往直以乾坤為天地而不少致思亦不復玩味其辭以求消息盈虛之理胡不以未有十翼之前觀之乎乾坤卦下之辭與六爻之辭及用九用六之辭凡二百十七字自飛龍在天一字之外皆未嘗以天地為言至孔子作彖象文言乃始詳陳天地之理特舉其得乾坤健順之大者以明之耳豈可直謂之天地而不深玩其辭哉先儒亦曰為君為父在人之乾也為玉為金之類在物之乾也乾坤之理無乎不在而謂乾坤二卦即天地可乎初九在下乾之下九四在上乾之下皆未進于中者也故初有勿用之戒四有或躍之疑九三在下乾之上上九在上乾之上皆過乎中者也故三有夕惕之戒上有亢悔之災惟二五各居一卦之中而不偏不過則中正合德而皆有利見大人之辭其所以詔天下後世者甚明白矣至如初與四雖皆未進乎中而初最在下其剛健尤戒于輕進故曰潛龍勿用曰勿用云者言其必不可用也四則出于下卦之上有時而可進故雖或躍在淵而無咎三與上雖皆過乎中而上處一卦之極剛健之過甚者也故曰亢龍有悔曰有悔云者言其當有悔也三則猶在上卦之下其過未至于甚也故惟終日乾乾夕惕若厲則可以無咎初九之辭決戒之切也九四之辭疑則與之進也九三之辭詳猶可勉也上九之辭直則不可為也聖人之言纎悉委曲一至于此則亦惟恐其陽剛之或偏而已用九曰見羣龍無首吉正謂陽剛易過所以用之者要不可為首也六十二卦皆無用九用六而獨于乾坤言之于其純者而戒其偏且過也六十二卦之九六即乾坤之九六也坤卦説乾坤雖以隂陽之純而成卦然純則乾坤不交而失之偏偏則過矣故乾坤二卦惟二五兩爻為善而他爻皆有戒之之辭至于用九用六又必各有其道其詳已論于前今觀坤之卦辭與夫用六之辭益甚昭晰如曰利牝馬之貞惟恐其順而不貞也又曰安貞吉惟恐其不安于貞也又曰利永貞惟恐其貞而不能久也貞而安安而久則隂柔庶幾其不偏乎初六在下卦之下故有履霜之戒六四在上卦之下故有括囊之戒皆以隂柔之不得中也六三在下卦之上故曰無成有終戒其須倡乃應也上六在上卦之上故曰龍戰于野戒其盛而侵陽也皆以其隂柔之過中也惟二五各居其中故二之直方大不必習而自無不利五之黃裳能處中以順而獲元吉亦如純乾之二五焉若夫履霜戒于一隂之初括囊戒于多懼之位三猶可以含章而從事上則至于龍戰而道窮則亦乾卦爻辭不同之意也由是觀之乾坤之畫雖純要必相濟而後可一失其中則聖人必為之慮學易者可不玩味于消息盈虛之際哉屯卦説易始于乾坤者隂陽之純也而繼之以屯者九六之初交也乾之畫初交于坤而為震再交于坤而為坎所謂一索再索而得長男中男者也畫卦必自下而上今震在下而坎在上則乾坤之交莫先于此矣故曰剛柔始交震動于下而坎險陷之故曰難生此所以名之曰屯而次于乾坤也剛柔既交則造化之功見故大亨屯難之世唯正能處之故利貞所謂勿用有攸往利建侯者深以輕犯險難為戒而利在于求輔以濟斯世也故初九爻辭亦曰利居貞利建侯蓋拯難之道唯剛健而能謙下者乃克有濟初九以陽剛居動之始又在五爻之下真濟難之才也一卦之義實具于此是以卦下之辭與初爻之辭皆同卦辭曰無亨利貞此則曰利居貞卦辭曰利建侯此亦曰利建侯卦辭曰勿用有攸往此則先之以盤旋不可輕動之戒聖人之意豈不明甚故五雖以陽剛得位而在坎險之中雖有六二之正應而隂柔非濟難之材故猶屯其膏不免于凶也處險而無輔又不能以貴下賤宜不足以有為六二上六皆以隂居隂位而乘初五之剛非唯柔弱不進皆有乘馬班如之象而亦有邅如漣如之咎矣就二爻而言之六居二為得中得位故為女子之貞雖應于五而五在險中不能字之屯難之極必至于十年反常而後正應得乃字言其中正猶可以俟時亦利居貞之義也上六則柔過于中而居險之極豈長久之道哉故曰泣血漣如何可長也六二曰非寇婚媾六四曰求婚媾往吉無不利皆指初而言也初之下二雖非其應而當屯之時陽下隂有求附婚媾之義非冦害之者也六四雖以隂居隂位而正應在初有舍已從人之象故如班馬之退以求婚媾往吉而無不利也二不應初則十年不字四能從其正應則往吉而孔子謂之明益可見屯之六爻惟以剛健而能謙下者為一卦之主也至如六三當震動之極而以隂居陽位無濟難之才而躁動者也故有即鹿無虞之戒君子必貴于知幾而能舍苟不度已之不可動而妄進焉安得而不吝此亦勿用有攸往之義也蒙卦説剛陷于險又在艮止之下所以為蒙謂其有所蔽而未發也然卦辭專言童蒙而六五爻辭亦言童蒙吉者謂其渾然固有本無所蔽莫如童子之蒙也蒙之所以亨而可以養正者以此説者皆曰九二為一卦發蒙之主羣蒙資之以明者也其説原乎初筮告以剛中之語殊不知卦之所謂初筮告者為初六而言也彖所謂以剛中者為初六之近于九二也當蒙之時隂爻必求陽以發其蒙然惟切近于陽而下之者則有發蒙之望六三以隂居陽位而乘二之剛非能謙下者也雖見上九陽剛之配為可應而不知在已者無其質亦上九之所不與也故曰勿用取女見金夫不有躬無攸利六四上下為二隂所間而其爻又獨逺于二陽困之道也故曰困蒙吝惟六五切近上九而下之有謙恭下善之意而又下應九二故曰童蒙吉而象亦曰順以巽也初六之于九二亦如六五之近于上九而下之故有發蒙利用刑人用説桎梏之辭而彖亦曰初筮告以剛中也若夫九二雖以剛中而有發蒙之資然猶在坎險之中不過能自涵養其蒙以納隂爻之比與應者而已未能盡去諸爻之蒙僅如子之克家非可盡專其事也故有包蒙納婦子克家之象焉其實蒙之一卦惟上九能盡發蒙之道以其艮止之陽超乎諸爻之上能定能應有以出乎其類而後足以去衆人之蒙也故不曰發蒙而曰擊蒙言能盡去其蒙也古今解者但見此爻有不利為冦之語因疑其未盡善而獨取于九二之剛中亦未之思也發蒙之道不過啓其未開之明而已明固彼之所自有非發者所能加損益也既已啓之矣則蒙去而明自生非于擊蒙之外復有明以與之也不然蒙已去而更求焉是告子之欲戕賊人性以為仁義者也故曰利禦冦言利于去人之蒙也故曰不利為冦恐其用心之過而反以害其天也亦因艮止之義而為之戒也發蒙之道無大于此豈九二所可比也卦辭曰初筮告言童蒙求發于我當決于其疑之初也曰再三瀆瀆則不告言疑已決而瀆告之非徒無益適以瀆夫蒙也初六所謂利用刑人用説桎梏者言發蒙如施刑于人既刑則説其桎梏刑既施而猶桎梏之則非君子用刑之本意故曰以往吝言過此則吝也初筮則告刑人則説其桎梏所謂利禦冦者也再三則瀆以往則吝所謂不利為寇者也聖人既于卦辭詳陳此理而又于初上兩爻推明此理學者尚何疑耶需卦説需之為卦不特以乾剛遇險而致須待之戒九五之剛雖居中得正三陽又自下進為己助然五方在險亦不可不須也故象曰君子以飲食宴樂而九五亦曰需于酒食貞吉言吉所以為九五之戒明矣其曰宴樂酒食云者言當涵養以俟時非謂宴安以自怠也蓋純乾上進往則有功不患不能出險但患不能俟時而失輕重爾此聖人所以于四陽爻皆致戒也初九去坎尚逺故戒以需于郊而利用恆二則漸近于坎故戒以需于沙而小有言三則切近于坎矣故言需于泥而致寇至曰郊曰沙曰泥皆以去坎水之逺近取象曰利用恆曰小有言曰致寇至皆因其逺近之殊而為之戒曰不犯難曰衍在中曰敬慎不敗又所以明三陽處需之道也初則謹之于始二則中而裕三能敬謹而不至于敗則其為純乾剛健之戒豈不委曲詳盡哉若夫隂爻則欲亟去而不可以需故六四曰需于血言陽剛方進隂或需而不去則必為陽所傷也曰出自穴言當亟出以避陽也上六曰入于穴有不速之客三人來敬之終吉言三陽方來亦惟入穴以避之可也此兩爻皆言隂之不可以需也四居坎下故言出穴上居坎上故言入穴其為敬順以避陽剛則一而已訟卦説訟上剛下險有訟之理天水違行有訟之象世皆知之矣然九二之剛窒于二隂之間而與九五不相應亦所以為訟也剛而居中則為有孚遇窒而惕則中斯獲吉孔子曰剛來而得中蓋謂此一爻也曰終凶者言雖有孚信而又能惕懼猶不可以終訟則訟其可以成乎故六爻之間以六處初以六處三皆隂居陽位非健而欲訟者也故初有不永所事之吉三有貞厲之吉以九處二以九處四皆陽居隂位雖欲訟而不能者也故九二不克訟必至于失衆知懼而後無眚九四不克訟必能自反知變而後有安貞之吉惟九五居中得正為聽訟之主所謂利見大人尚中正者也故獲元吉上九則在健之極處訟之終所謂終凶者也故雖以訟受服而不免三禠之辱矣需之九二陽居隂位非健而進者也其位應乎坎之中而其爻則不應故曰小有言終吉取其在中而能需也訟之初六隂居陽位非健而訟者也雖已在坎體而近乎中爻然隂柔決不終訟故亦曰小有言終吉取其能謹于訟之初也坤之六三曰或從王事無成有終以其隂居陽位而戒之也訟之六三亦曰或從王事無成而不言有終則以其訟之不可終也學易者要以類通之師卦説坎險也坤衆也亦順也兵凶器戰危事險莫甚焉衆行險上師之象也行險而順師之道也此坤上坎下所以為師也卦辭所謂師貞者師以正為本也所謂丈人吉者丈人長者之稱必不嗜殺人者能吉而無咎也夫五隂而一陽則一陽固羣隂之所宗然陽居五則為比大君得位而上下應之也陽居二則為師人臣處此惟行師用兵而後可也故彖曰剛中而應言二以剛居中而得六五之正應也九二又曰王三錫命而象亦有承天寵懷萬邦之辭言二雖以中而獲吉亦惟天子有以委任寵嘉之爾九二任帥師之責者也又以陽處隂位而得中然聖人必諄諄推明六五正應之吉以詔天下後世者于以見人臣有權得衆皆其君寵仕之所致也不然剛中而不應則惟怙兵自大其不陷于背叛滅亡者幾希安得師中之吉哉聖人不特于此為人臣之訓又于六五為人主之訓曰田有禽利執言無咎言禽之犯田執之為有辭如弔民伐罪而師出有名者也故可以無咎蓋六五以柔居尊位決非好大喜功之君所謂丈人之無咎是也古今説者皆以丈人為主九二而言殊不思帥師之權雖在乎將而興師之權實出乎君帥師固貴乎剛中而興師當出于不得已此六五之所以為丈人而吉無咎也曰長子帥師弟子輿尸貞凶則因為六五將將之訓也既不得已而用師又將剛中之臣以任之則帥師之權俾二專之可也不然任之不專而衆或得以主之則稟命不一取敗必矣故雖正亦凶此又以六五之柔而恐其易惑也在下四爻惟六三以隂居陽處非其位而又在坎險之極乘九二之剛有出位犯分之象故爻辭先有輿尸之戒而于六五加詳焉聖人之意亦何明哉若夫初六出師之始惟戒失律六四隂柔之至以自知其不能而左次為無咎上六用師之終而䇿勳行賞戒以小人勿用凡師之道始末盡矣然惟六五一爻言執言之利而餘爻終不言亨利其曰吉者又必繼之以無咎謂不如是則不免有咎也嗚呼兵其可以輕用哉比卦説一陽得中得位而五隂從之有比之象焉隂之從陽雖不可以苟合亦不可以後時故原筮元永貞無咎謂再三卜度其長人之仁能久而不失其正則比之可以無咎明九五之剛中為可比也不寧方來後夫凶謂羣隂不能自安方當就陽以求安而已獨後也烏得而不凶明上六之乘剛為不知所比也是故易中六爻貴于正應其近而相得亦有不必應者也惟比之諸爻則不論其應之正否而專以比于五為吉蓋陽剛中正得時得位可以為天下之主則天下之人捨九五將安歸乎今夫六二之于九五正應也故曰比之自內貞吉言二自內以比于五非五之求比于二也六四當應于初兩隂不相應獨取其近而能比于五故曰外比之貞吉言外有可比則為正吉不必應初于內而後為正也初六曰有孚比之無咎非特相比之始貴于誠信亦言九五之中實為有孚而可比也曰有孚盈缶終來有它吉言誠信苟充雖以缶之盈終來相比而吉也然而必曰有它吉者它之為言在彼而非必于一者也謂初能求有孚者而比之固不必偏于所應而謂它之必不可也深言其當舍四而從五也以二比五則為自內以四比五則為外比以初比五則為它吉諸爻之義斷可知矣惟上六乘乎九五之剛而不知比乎五又在比之終坎之極所謂後夫者也衆隂皆有所宗而已獨無之是無元首也其無所終而終凶宜矣六三應乎上六者也故亦有比之匪人之傷則當比之時可不惟九五之從哉又嘗論之九五之所謂顯比以其陽剛中正而顯然為天下之所比也然必曰王用三驅失前禽而後邑人不誡吉陽剛獨用恐其或過于剛也知三驅之禮舍前禽而不敢盡取則用九之道庶乎其盡善也大有之卦柔居尊位而能有大者也聖人于六五必曰威如吉亦恐其過于柔也于比之剛而曰失前禽于大有之柔而曰威如吉聖人之以中道詔天下後世如此哉小畜卦説世之言易者曰艮在上而乾在下以艮止而畜乾也艮陽卦易以陽為大故曰大畜巽在上而乾在下巽隂卦也易以隂為小故曰小畜雖然乾健上行而遇艮止謂之畜可也今遇巽而亦謂之畜何也如曰畜止剛健莫如巽順則兊説亦可以畜乾乎嘗試思之乾之一陽初交于坤而為震故謂之長男坤之一隂初交于乾而為巽故謂之長女巽者坤之初交而乾之初變也故易乾上巽下則為姤而聖人有女壯勿用取女之戒巽上乾下則為小畜而聖人有密雲不雨自我西郊之戒蓋六十二卦雖皆乾坤六子交錯而成惟乾巽之成卦則坤畫之初交于乾者爾其在下也為姤其在上也則為小畜曰小畜云者為三陽方長而六四居上卦之下以限隔之下之三陽不得以進于上而上之二陽不得以接于下六四獨以隂居隂而在二卦之中此其所以能養畜夫陽也非巽之能畜乾也坤之一隂初來變乾而居于四其柔為得位也故曰柔得位而上下應之然五陽而一隂豈能中間乎陽哉苐如西郊之雲隂徒倡而不雨爾况乎二五皆以剛得中而乾健上行其勢亦安得畜故曰剛中而志行乃亨今夫乾者陽之極也復者陽之初也小畜之時雖以乾之剛健亦未可以輕進故初九欲其復之自道九二欲其牽以復于中皆自反之義陽雖盛而退託于不足者也至九三則處乾之極而迫近于四矣故有輿説輻夫妻反目之象輿而説去其輻言不能以有行也夫妻反目言隂陽之必相傷也九五曰有孚攣如富以其鄰言剛實在中與九二為類有孚者也小畜之時雖有隂以間之而二與其鄰皆陽剛富實而同為乾體其勢必相連以進謂小畜之不能久也上九曰既雨既處尚德載者言五以有孚下接于三陽而上九又以剛在上則是尚德而能有成者也與大有大畜之上九所謂尚賢同義向以乾陽被畜而不雨今五陽交孚則陽倡隂和而自雨矣既雨則隂陽各得其所矣曰婦貞厲月幾望君子征凶言小畜之極如婦之用事雖正亦厲如月之幾望必至與陽為敵君子亦不可有行也故詳戒之欲九五知尚德之有成而與上九下應于三陽無使隂得以先倡而不雨也若乃六四之所謂有孚非言四之有孚也謂二五皆具剛實有孚之德已雖欲間之而終不能乾陽上進徒自傷而已惟傷而知去惕而知出以避三陽之進則與上二爻合志而可以無咎正如需之六四所謂需于血出自穴亦戒其避乾陽之進也説者但見彖言柔得位遂以有孚為六四之善而一卦之意益以不明其未之思乎大抵小畜以一隂居五陽之間又在乾陽之上聖人慮乾陽之輕于上行也故于下三陽皆有自反不輕進之辭又慮九五上九之親夫四而不知接乎下也故于上二陽皆有陽剛交孚同德之意惟六四則戒其血去惕出以見小畜之必不可久也嗚呼大易之旨其深矣乎履卦説履之成卦本以一柔履二剛而上承三陽介乎兩卦之間其所履似危矣而其實兊説上應乎乾非如小畜一隂之在乾上也故曰履虎尾不嘻人亨然六三爻辭乃曰履虎尾嘻人凶則與卦辭不同何也蓋卦論乾上兊下之體故以説應乎乾為善而有不嘻之亨爻論隂居陽位而又承乘皆陽則有不能自量而躁動之象故有嘻人凶之戒既取其説之能亨又戒其失位之見嘻聖人作易之意深矣何以言之六以隂柔而居三之陽位又上承九四而下乘九二皆陽也好剛之過則必忘其六之本柔故不自量而妄以視履為能其不逼陽而取禍者幾希故曰武人為于大君言如武人志存剛暴而在人上必不可者也六三雖履二陽之上猶在乾陽之下也而深戒其好剛之志惟恐其不量力而妄動也初九曰素履往無咎言君子之所履貴乎有素則當謹于其初也九二曰履道坦坦幽人貞吉言陽剛得中則所行坦然而無險怪之失上雖無應不害其為幽人之正也九四居近君之位而下有失位之隂不可不畏故惟訴訴恐懼然後可以終吉九五剛中得位而下説以應之不可以莫豫違而肆志也故雖剛可決柔而正固不能無危厲至上九則履道之成可以視所履而考祥矣然在一卦之終處乾剛之極苟非知所自反則亦未能盡善故惟其旋而後元吉然則君子之踐履其可須臾不謹哉故夫履之為卦因柔之履剛以為萬世踐履之訓也而孔子之象尤為詳切初九之象言獨行願也則雖無應而獨行其所願九二之象言中不自亂也則不以無應而汨厥中九四之象言志行也則不以處多懼之地而乖其素志皆踐履之難而反求諸已者也由是推之所謂履虎尾者豈特以柔履剛為喻哉欲君子知踐履之難而不敢忽焉耳非説應乎乾而樂循天理何足以盡此泰卦説易以陽為大隂為小故以陽為君子隂為小人如小畜之九四與乾之三陽上應九五故曰有孚攣如冨以其鄰謙之六五與六四上六皆坤體故曰不富以其鄰則又以陽為冨也如蒙之六四獨逺于二陽故曰獨逺實鼎之九二陽剛在中故曰鼎有實則又以陽為實也今泰之成卦乾在下而坤在上有天地交之象焉故于隂陽消長之理言之為最詳曰小往大來曰內陽外隂言隂往于外而陽來于內也曰內君子而外小人又曰君子道長小人道消言來者長而往者消也六四隂也六五上六同坤體也故曰翩翩不冨以其鄰上卦俱隂而無陽故曰皆失實也曰小曰大曰君子曰小人曰冨曰實皆具于此一卦之內則所以發明隂陽之理豈不明白詳盡哉大抵泰之為卦不特取其乾下坤上為乾坤之交而三隂三陽內外六爻實交相為應初九上應于六四故三陽同升而有拔茅彚征之象六四下應于初九故三隂翩翩同降而不戒以孚此初與四之交相應也九二上應于六五故引其類為有道而得尚乎中行之君六五下應于九二故下下以成其政而得帝乙歸妹之吉此二與五之交相應也惟九三上六各居二卦之極故雖相應而皆有警戒之辭九三處乾之極天地之際也所以有無平不陂無往不復之戒上六處坤之極泰之終也所以有城復于隍之戒九三之時尚可為也故能艱貞而無咎勿恤其孚而盡其在我則可以長享其福上九之時不可為也故雖自邑告命而其命益亂而不免于吝此聖人所以貴于制治于未亂而保邦于未危者也包荒用馮河不遐遺朋亡先儒之説非一也然多抵牾而不通其實謂九二得時引類之道如此而已人材有不及者容之所謂包荒也其或勇為之過則亦取之所謂用馮河也不以其逺而遺之不以其朋而私之所謂不遐遺朋亡也皆所以引類而配于中行之君也過與不及皆無所棄而私與親皆無所偏誠用人之要道而極治之世尤不可不留意也此九二之責也否卦説泰否雖以乾坤之交與不交為義然泰則三陽在內有君子同升之象隂雖在外而六五下應九二有柔得尊位而能下賢之象故泰之六爻専以交相應為善否則三隂在內有小人方進之象陽雖在外而九五居中得位有剛健中正以興衰撥亂之象故否之六爻惟三陽爻為善各因其爻而取義固與論成體之卦不同也在否之初隂雖相連有如茅茹之拔然非如泰之可以彚征也惟守正則吉而亨爾象曰志在君也言有志于事君非正不能也六二以隂居隂而又承乘皆隂隂柔之甚者也故以包容承順為小人之吉若大人則寧身否而道亨豈以承媚為吉乎六三居非其位而在順之極其所以包容苟且益可羞矣故曰包羞位不當也此三爻皆以隂之方進而為小人戒也至于九四雖陽不當位然出于下卦羣隂之上與二陽同德而近九五剛中之君苟得君而有所承命則可以無咎而使疇類咸附麗其福也九五剛健中正有能休否之理故言大人吉曰其亡其亡繫于苞桑言當時時警懼危亡以為安固之道也上九處乾之極當否之終乾極則變而否終則傾故先否而後喜此三爻皆言陽之在上否極必泰而為君子勸也泰之三陽君子在內之象也而九二不忘包荒朋亡之戒否之三隂小人在內之象也而六二乃有大人否亨之辭泰至于上六極治也而城復于隍若不可以一朝安否至于上九極否也而先否後喜必有可為之理消息盈虛之不常如此宜乎序卦有物不可以終通終否之説也同人卦説同人卦惟一隂衆陽之所同歸也一隂在五則是柔得中而居尊位上下之所同應也故為大有一隂在二則是柔得中而有謙下以同乎人之象故為同人正如一陽在上卦之中則為比在下卦之中則為師也曰同人于野亨言逺無不同而後為亨也曰應乎乾者言合乎天理則非私意之同也是故一卦之爻惟初九居六爻之下有捨已從人之義故如出門同人而可以無咎六二雖以成卦言之有中正謙下之美然以爻言之則正應惟五而所同有限故有同人于宗之吝九三以陽居陽又在下卦之上而不應上九之剛非能謙下者也故伏戎于莽升其髙陵有疑其所應而欲在人上之意安得與人同哉此所以三嵗不興而無所往也曰安行者言其安所往也自是以上三爻皆乾體尤非能謙下同人者也故九四之乘剛有乘墉之象惟弗克攻而能自反則吉九五亦先號咷而後笑雖以剛中下應六二非九三九四二陽所間如大師可以必克而相遇然係應惟二所同未大此所以不言吉也上九以陽處隂以能同人于郊庶幾同人于野者矣然陽在六爻之上又居乾健之極終非謙下而能與人同者僅能無悔而已象言志未得也言陽剛自髙終未可以得志也然則同人之道其惟執謙守柔而忘已之私者乎大有卦説大有不惟五陽一隂柔得尊位有不自滿假可以持盈守成之義而離明在上亦天下之所同歸也故六爻雖或不應而皆有亨吉無咎之辭初九九四皆陽爻而不相應者也然當大有之時上有柔明居中不自大之君諸陽之所同歸而不在于應固非相害而為咎也故曰無交害匪咎惟大有之初能思所以有大之艱難則無咎故又曰艱則無咎九二與六五為正應君能體明執柔以接下而臣能剛中以任重者也故曰大車以載有攸往無咎九三居下卦之上雖重剛不中然當大有之時羣陽並進亦能自通于柔明之君者也故曰公用亨于天子其曰小人弗克者言此時此位必惟陽剛君子而後能得乎君也九四處近君之位當大有之時而能以剛居柔則亦不敢有其大者也故曰匪其彭彭盛多貌言不自以為盛也非明哲之君子孰能深知乎此理故曰明辨晳也六五之柔明固五陽之所交孚然柔不可過也故必有威可畏而後為吉夫子又慮後世不知所謂德威之威而或作威以傷夫大有之盛也故曰威如之吉易而無備言平易而無防間擬備自然之威人自敬之非為髙亢崖岸以絶乎其下也既曰孚矣又曰威如吉既曰威矣又曰易而無備聖人之為天下後世慮何其諄復切至哉六五以柔得位而下有九二剛實有孚之應所謂履信也以六居五得坤黃裳之元吉所謂思順也上九以剛在上而已以柔下之所謂尚賢也故于上九曰自天祐之吉無不利言六五之能尚賢所以為大有之美也然則坤之卦辭曰元亨大有亦曰元亨坤之六五曰元吉而大有推言六五尚賢之美亦曰上吉嗚呼微哉謙卦説説易者曰地體卑下山髙大之物而居地下謙之象也然謙五隂而一陽初在艮止之下五得柔順之中二與四皆當位而比乎三上六又下與九三相應五柔皆有卑順從陽之義故其卦為謙况九三一爻雖以陽居陽而在上卦之下又艮陽以止為體亦有謙退不進之象此謙之六爻所以皆吉而無凶也以六處初而在艮下謙之又謙者也故曰謙謙君子六二上比于九三柔得中正而有求陽之意故曰鳴謙貞吉上六與九三為正應者也故亦曰鳴謙皆謂其自鳴以求陽之應也解者不知鳴謙之義又惑于上六所謂志未得之辭乃以六二之鳴謙為善而以上六之鳴謙為非是隨爻辭而妄為之别也象之所謂志未得者言上六謙之極猶未以為得志而下求乎陽也非以其為未善也至如九三以陽剛而知艮止有勳勞而能謙者也故曰萬民服六四隂柔得位而下比于三為撝布其謙者也故曰不違則六五以柔順居尊位其鄰皆隂而無自盈既富之意也故利用侵伐無不利皆所以言謙之美也雖然師卦不言侵伐行師之利而謙之六五上六乃詳言之謙豈用師之道哉蓋惟謙之柔順知止而無好大喜功之心况六五上六處謙順之極其于用師必有不得已之意不然未見其利也師之六五曰田有禽利執言無咎亦以其坤順之中而後可以言利也哉豫卦説隨卦説
